version: 2

seeds:
  - name: bp_thresholds
    description: |
      Blood pressure thresholds per NICE NG136: treatment targets (TARGET_UPPER),
      diagnostic thresholds (DIAGNOSIS_*), and the severe hypertension cut-off.

      Each TARGET_UPPER rule is recorded twice — once with measurement_context =
      'CLINIC' (the clinic target) and once with measurement_context = 'HBPM_ABPM'
      (clinic target -5 mmHg, per NG136 rec 1.4.22 "the corresponding measurements
      for ABPM and HBPM are 5 mmHg lower than for clinic measurements"). Consumers
      comparing a reading against a TARGET_UPPER row must filter by
      measurement_context to match the reading source (clinic vs home/ambulatory).

      Diagnostic rows already encode the context in threshold_type. The SEVERE
      row (≥180/120) applies regardless of measurement source.

      Replaces the DATA_LAKE__NCL.ANALYST_MANAGED.BP_THRESHOLDS Snowflake table
      so the NG136 rule is version-controlled alongside the consumer logic.
    config:
      column_types:
        threshold_rule_id: varchar(64)
        programme_or_guideline: varchar(64)
        description: varchar(255)
        patient_group: varchar(32)
        threshold_type: varchar(32)
        measurement_context: varchar(16)
        systolic_threshold: integer
        diastolic_threshold: integer
        operator: varchar(16)
        notes: varchar(255)
    columns:
      - name: threshold_rule_id
        description: Unique rule identifier. HBPM/ABPM variants carry the "_HBPM_ABPM" suffix.
        tests:
          - unique
          - not_null
      - name: programme_or_guideline
        description: Source guideline (currently NICE NG136).
        tests:
          - not_null
      - name: description
        description: Human-readable description.
      - name: patient_group
        description: AGE_LT_80 | AGE_GE_80 | T2DM | CKD | CKD_ACR_GE_70 | DIAGNOSIS | SEVERE.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['AGE_LT_80', 'AGE_GE_80', 'T2DM', 'CKD', 'CKD_ACR_GE_70', 'DIAGNOSIS', 'SEVERE']
      - name: threshold_type
        description: TARGET_UPPER for treatment targets, DIAGNOSIS_S1_* / DIAGNOSIS_S2_* for staging, SEVERE_CLINIC for the Stage 3 cut-off.
        tests:
          - not_null
      - name: measurement_context
        description: CLINIC or HBPM_ABPM. For TARGET_UPPER rows, identifies which reading source the threshold applies to. For DIAGNOSIS and SEVERE rows, repeats the context already encoded in threshold_type.
        tests:
          - accepted_values:
              arguments:
                values: ['CLINIC', 'HBPM_ABPM']
      - name: systolic_threshold
        description: Systolic BP in mmHg.
        tests:
          - not_null
      - name: diastolic_threshold
        description: Diastolic BP in mmHg.
        tests:
          - not_null
      - name: operator
        description: BELOW for TARGET_UPPER (controlled if value < threshold); AT_OR_ABOVE for DIAGNOSIS / SEVERE.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['BELOW', 'AT_OR_ABOVE']
      - name: notes
        description: Free-text clinical note.
