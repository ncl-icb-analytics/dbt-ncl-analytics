version: 2
seeds:
  - name: pssru_unit_costs_2024
    description: |
      Unit costs per practitioner role group derived from the PSSRU Unit
      Costs of Health and Social Care 2024 Manual (Jones et al., 2025).

      Base year: 2023/2024 prices. Join to int_appointment_gp_clean on
      practitioner_role_group. Downstream models apply a GDP deflator
      adjustment (via uk_cost_indices) to convert between the PSSRU base
      year and the appointment's own fiscal year.

      Source: https://kar.kent.ac.uk/109563/ (PSSRU 2024 Manual v2)
      Key tables referenced:
      * Table 8.1  — AfC band mappings for scientific and professional staff
      * Table 8.2.1 — community-based scientific and professional staff unit costs
      * Table 9.3.1 — GP practice nurse unit costs
      * Table 9.4.2 — General Practitioner unit costs

      Proxying methodology: some analytical role groups (Paramedic, Nursing
      Associate, Care Navigator etc.) have no dedicated per-hour unit cost
      in PSSRU 2024. For these, is_proxy=TRUE and proxy_source names the row
      whose rate is borrowed. Band placement is grounded in PSSRU Table 8.1
      where the role is named explicitly, or ARRS AfC norms otherwise.
      Every proxy is documented in notes so downstream consumers can
      distinguish direct PSSRU figures from band-inferred ones. Use
      is_proxy in cost reporting to flag imputed rows if needed.

      Rows with NULL costs (Other, Unknown, Admin) are kept for
      completeness — the downstream LEFT JOIN will carry NULL into the
      cost columns of int_appointment_gp_clean for those appointments.
    config:
      meta:
        owner:
          name: Eddie Davison
      column_types:
        cost_per_hour_gbp: float
        cost_per_minute_gbp: float
        is_proxy: boolean
    data_tests:
      # Proxy-provenance contract: every row flagged as a proxy must
      # name its source role and document the rationale in notes, so
      # imputed costs are never untraceable.
      - dbt_utils.expression_is_true:
          arguments:
            expression: "proxy_source is not null and notes is not null"
          config:
            where: "is_proxy = true"
    columns:
      - name: practitioner_role_group
        description: Join key matching int_appointment_gp_clean.practitioner_role_group (and sds_role_groups.practitioner_role_group).
        data_tests:
          - not_null
          - unique
          # Coverage contract is enforced on the sds_role_groups side:
          # see seeds/sds_role_groups.yml for the relationships test that
          # asserts every analytical role group from SDS has a row here.
      - name: cost_per_hour_gbp
        description: PSSRU 2024 unit cost per working hour in 2023/24 prices. NULL for non-clinical / Unknown / Admin rows.
      - name: cost_per_minute_gbp
        description: Convenience column — cost_per_hour_gbp / 60. NULL where cost_per_hour_gbp is NULL.
      - name: afc_band
        description: Agenda for Change band placement for the role (where applicable).
      - name: is_proxy
        description: TRUE when cost is borrowed from another row (proxy_source) because PSSRU has no direct per-hour figure for this role. Use to flag imputed costs in downstream reporting.
        data_tests:
          - not_null
      - name: proxy_source
        description: When is_proxy=TRUE, names the role whose rate is borrowed. NULL otherwise.
      - name: pssru_table_ref
        description: PSSRU 2024 Manual table reference the figure was drawn from (e.g. "Table 8.2.1").
      - name: notes
        description: Free-text rationale for the chosen rate — particularly important for proxied rows.
