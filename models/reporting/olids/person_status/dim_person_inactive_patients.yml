models:
  - name: dim_person_inactive_patients
    description: >
      Inactive patients dimension — thin wrapper over dim_person_demographics
      filtered to deceased patients and patients from closed/obsolete practices.
      Excludes dummy patients. Ref: issue #641.
    config:
      meta:
        owner:
          name: EddieDavison92
    columns:
      - name: person_id
        description: 'Unique person identifier - primary key'
        data_tests:
          - unique
          - not_null
