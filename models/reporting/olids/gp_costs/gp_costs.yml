version: 2
models:
  - name: fct_gp_appointment_costs
    description: |
      GP appointment unit-cost fact at practice / month / role grain.

      Scope: rolling last 60 months of appointments, anchored to the
      latest start_date in int_appointment_gp_clean. OLIDS only retains
      records for patients who left or died within the last ~5 years —
      anything older is silently truncated to currently-registered
      patients only and would bias historical cost reporting. Keeping
      this fact at 5 years matches OLIDS retention.

      Aggregates int_appointment_gp_clean by workforce mix. Two cost
      totals per group:
      * total_cost_gbp_base_prices — always in PSSRU 2023/24 real-terms
        prices, use for cross-year comparisons
      * total_cost_gbp_nominal — in the appointment's own fiscal year
        prices (GDP deflator adjusted), use for contemporaneous reporting

      cost_is_proxy flags rows whose unit cost is borrowed from another
      role's PSSRU rate. Filter WHERE cost_is_proxy = FALSE for direct
      PSSRU figures only.

      For DNA-cost reporting see fct_gp_dna_costs (practice × month
      grain). For person / demographic / equity cost analysis use
      sem_olids_appointments — but apply the same 5-year caveat to
      any historical comparisons. For full cost methodology see the
      int_appointment_gp_clean and pssru_unit_costs_2024 descriptions.
    config:
      meta:
        owner:
          name: Eddie Davison
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - practice_code
              - report_month
              - practitioner_role_group
              - sds_role_group
    columns:
      - name: practice_code
        description: GP practice ODS code (record_owner_organisation_code from the appointment).
        data_tests:
          - not_null
      - name: report_month
        description: First day of the calendar month the appointment occurred in.
        data_tests:
          - not_null
      - name: fiscal_year_start
        description: UK fiscal year start (calendar year in which 1 April falls). Functionally determined by report_month.
      - name: practitioner_role_group
        description: Analytical practitioner grouping from sds_role_groups seed.
        data_tests:
          - not_null
      - name: sds_role_group
        description: Official NHS Digital SDS role group passed through from int_appointment_gp_clean.
      - name: cost_is_proxy
        description: TRUE when this practitioner_role_group's unit cost is borrowed from another role's PSSRU rate. FALSE for direct PSSRU figures.
      - name: cost_proxy_source
        description: Names the role whose rate was borrowed when cost_is_proxy is TRUE. NULL for direct PSSRU figures.
      - name: appointment_count
        description: Total appointments in the group (excluding admin roles which are filtered out upstream).
      - name: attended_count
        description: Appointments where the patient attended (status code 5).
      - name: dna_count
        description: Appointments where the patient did not attend (status code 3).
      - name: arrs_appointment_count
        description: >
          Appointments staffed by an ARRS-scheme role code. Use as a
          measure within practitioner_role_group (e.g. ARRS share of
          pharmacist appointments) — is_arrs_role varies within
          practitioner_role_group so it cannot be a grain dimension.
      - name: total_duration_minutes
        description: Sum of cleaned duration_minutes (NULLs from untimed/list sessions are skipped).
      - name: avg_duration_minutes
        description: Average cleaned duration per appointment.
      - name: total_cost_gbp_base_prices
        description: Total cost in PSSRU 2023/24 real-terms prices. NULL contributions (untimed sessions, Other/Unknown roles) are skipped.
      - name: avg_cost_per_appointment_gbp_base_prices
        description: Average per-appointment cost in 2023/24 real-terms prices.
      - name: total_cost_gbp_nominal
        description: Total cost in the appointment's own fiscal year prices (GDP deflator adjusted). Pre-2000 fiscal years contribute NULL.
      - name: avg_cost_per_appointment_gbp_nominal
        description: Average per-appointment cost in contemporaneous fiscal year prices.
      - name: cost_per_minute_gbp_nominal
        description: Group-level cost efficiency — total_cost_gbp_nominal / total_duration_minutes.

  - name: fct_gp_dna_costs
    description: |
      GP "Did Not Attend" cost fact at practice / month grain.

      Scope: rolling last 60 months of in-scope appointments
      (is_attended OR is_dna), anchored to the latest start_date in
      int_appointment_gp_clean. Cancelled, rescheduled and other
      non-attendance statuses are excluded from both numerator and
      denominator (matches fct_gp_dna_rate).

      The 5-year window matches OLIDS retention: OLIDS only keeps
      records for patients who left or died within the last ~5 years,
      so historical reporting beyond 5 years systematically excludes
      leavers and biases DNA / cost figures toward stayers.

      Splits in-scope appointment cost into attended and DNA components,
      with DNA cost as both an absolute £ figure and a percentage of
      total cost. Use as a "cost of missed appointments" KPI for
      DNA-reduction work.

      Cost methodology is inherited from int_appointment_gp_clean.
      Both cost columns come in two pricing bases:
      * _base_prices — PSSRU 2023/24 real terms (cross-year comparable)
      * _nominal — contemporaneous (GDP deflator adjusted)

      For role-level cost breakdown use fct_gp_appointment_costs.
      For person / demographic equity analysis use sem_olids_appointments.
    config:
      meta:
        owner:
          name: Eddie Davison
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - practice_code
              - report_month
    columns:
      - name: practice_code
        description: GP practice ODS code.
        data_tests:
          - not_null
      - name: report_month
        description: First day of the calendar month the appointment occurred in.
        data_tests:
          - not_null
      - name: fiscal_year_start
        description: UK fiscal year start (calendar year in which 1 April falls). Functionally determined by report_month.
      - name: appointment_count
        description: In-scope appointment count (attended + DNA only).
      - name: attended_count
        description: Appointments where the patient attended (status code 5).
      - name: dna_count
        description: Appointments where the patient did not attend (status code 3).
      - name: dna_rate_pct
        description: dna_count / appointment_count × 100, rounded to 1dp. Matches fct_gp_dna_rate.
      - name: total_cost_gbp_base_prices
        description: Total in-scope cost in PSSRU 2023/24 real-terms prices.
      - name: total_cost_gbp_nominal
        description: Total in-scope cost in contemporaneous (GDP-deflator adjusted) prices.
      - name: attended_cost_gbp_base_prices
        description: Cost of attended appointments only, in 2023/24 real-terms prices. The "value-delivering" portion of total cost.
      - name: attended_cost_gbp_nominal
        description: Cost of attended appointments only, in contemporaneous prices.
      - name: dna_cost_gbp_base_prices
        description: >
          Cost of DNA appointments — clinician time allocated to
          appointments the patient did not attend. In 2023/24 real-terms
          prices.
      - name: dna_cost_gbp_nominal
        description: Cost of DNA appointments in contemporaneous prices.
      - name: dna_cost_pct_of_total
        description: >
          DNA cost as a percentage of total in-scope cost. Same value
          regardless of whether computed from base or nominal because
          the GDP deflator is constant within a (practice, month) group.
