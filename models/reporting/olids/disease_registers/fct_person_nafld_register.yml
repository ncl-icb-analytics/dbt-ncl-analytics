models:
  - name: fct_person_nafld_register
    description: 'Metabolic dysfunction-associated steatotic liver disease / non-alcoholic
      fatty liver disease register for patients with a qualifying diagnosis.

      One row per active patient with a qualifying diagnosis from the MASLD_DX_CODES
      terminology cluster.'

    tests:
      - dbt_utils.at_least_one:
          column_name: person_id

    config:
      meta:
        indicator:
          id: "NAFLD"
          type: "CONDITION"
          category: "LTC"
          clinical_domain: "Hepatic"
          name_short: "NAFLD"
          description_short: "MASLD / NAFLD register (non-QOF)"
          description_long: >
            Metabolic dysfunction-associated steatotic liver disease / non-alcoholic fatty liver disease
            register for persons with a qualifying diagnosis. Includes active patients
            with diagnosis codes drawn from the MASLD_DX_CODES terminology cluster.
            No age restrictions or resolution codes applied. Used for liver health assessment,
            cardiovascular risk stratification, and metabolic disease monitoring.
          is_qof: false
          source_column: "is_on_register"
          sort_order: "COND_HEPAT_NAFLD"
          usage_contexts:
            - "POPULATION_HEALTH_NEEDS_DASHBOARD"
          code_clusters:
            - cluster_id: "MASLD_DX_CODES"
              category: "INCLUSION"

        owner:
          name: EddieDavison92
    columns:
      - name: person_id
        description: Unique identifier for the person
        tests:
          - unique
          - not_null
