models:
  - name: fct_person_hypothyroidism_register
    description: 'Hypothyroidism register using HYPOTHY_COD and THY_COD clusters.

      One row per person (non-QOF).'

    tests:
      - dbt_utils.at_least_one:
          column_name: person_id

    config:
      meta:
        indicator:
          id: "HYPOTHYROIDISM"
          type: "CONDITION"
          category: "LTC"
          clinical_domain: "Endocrine"
          name_short: "Hypothyroidism"
          description_short: "Hypothyroidism register (non-QOF)"
          description_long: >
            Hypothyroidism register using HYPOTHY_COD (ECL << 40930008, 113 concepts)
            and legacy THY_COD cluster codes. No age restrictions or resolution codes.
            Chronic endocrine condition requiring ongoing medication and monitoring.
          is_qof: false
          source_column: "is_on_register"
          sort_order: "COND_ENDOCRINE_HYPOTHYROIDISM"
          usage_contexts:
            - "POPULATION_HEALTH_NEEDS_DASHBOARD"
          code_clusters:
            - cluster_id: "HYPOTHY_COD"
              category: "INCLUSION"
            - cluster_id: "THY_COD"
              category: "INCLUSION"

        owner:
          name: Eddie Davison
    columns:
      - name: person_id
        description: Unique identifier for the person
        tests:
          - unique
          - not_null
