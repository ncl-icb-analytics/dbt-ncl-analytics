models:
  - name: dim_person_conditions
    description: 'Population dimension with boolean flags for each condition.

      One row per person from dim_person_demographics (persons with recorded birth
      dates) with TRUE/FALSE flags for all conditions, eliminating null-handling complexity.'
    config:
      meta:
        owner:
          name: EddieDavison92
    columns:
      - name: person_id
        description: Unique identifier for the person
        tests:
          - not_null
          - unique
      - name: has_osteoarthritis
        description: Boolean flag indicating whether person is on osteoarthritis register
        tests:
          - not_null
      - name: has_adhd
        description: Boolean flag indicating whether person is on ADHD register
        tests:
          - not_null
      - name: has_chronic_liver_disease
        description: Boolean flag indicating whether person is on chronic liver disease register
        tests:
          - not_null
