models:
  - name: dim_ltc_lcs_cf_hf_61
    description: 'Patients with possible undiagnosed heart failure identified through medication, BNP, symptom, or spironolactone trigger branches.

      One row per person in the HF_61 cohort after excluding patients with heart failure excluded coding in the last 3 years.'
    config:
      meta:
        indicator:
          id: "LTC_LCS_CF_HF_61"
          type: "CASE_FINDING"
          category: "HF"
          clinical_domain: "Heart Failure Case Finding"
          name_short: "HF_61: Possible undiagnosed HF"
          description_short: "HF medication, BNP, or symptom triggers without recent HF exclusion"
          description_long: >
            Current registered patients not already on AF/HF registers or metabolic LTC
            cohorts, with no prior HF evidence, who meet one or more HF trigger branches:
            recent HF-indicative medication, raised NT-proBNP without later referral or
            exclusion, cardiomyopathy with breathlessness, recent digoxin, or recent
            spironolactone excluding likely PCOS-pattern coding. Final cohort excludes
            heart failure excluded coding in the last 3 years.
          is_qof: false
          source_column: "person_id"
          sort_order: "LTC_LCS_HF_61"
          usage_contexts:
            - "LTC_LCS_DASHBOARD"
            - "CASE_FINDING_PROGRAMME"
          code_clusters:
            - cluster_id: "hf_case_finding_eligible_patients_vs1"
              category: "INCLUSION"
              time_window: "3_MONTHS"
            - cluster_id: "ENTRESTO_PRODUCTS"
              category: "INCLUSION"
              time_window: "3_MONTHS"
            - cluster_id: "hf_case_finding_eligible_patients_vs3"
              category: "INCLUSION"
              time_window: "3_MONTHS"
            - cluster_id: "hf_case_finding_eligible_patients_vs4"
              category: "INCLUSION"
              time_window: "3_MONTHS"
            - cluster_id: "hf_case_finding_eligible_patients_vs5"
              category: "INCLUSION"
            - cluster_id: "hf_case_finding_eligible_patients_vs6"
              category: "EXCLUSION"
            - cluster_id: "hf_case_finding_eligible_patients_vs7"
              category: "EXCLUSION"
            - cluster_id: "hf_case_finding_eligible_patients_vs8"
              category: "INCLUSION"
            - cluster_id: "hf_case_finding_eligible_patients_vs9"
              category: "INCLUSION"
            - cluster_id: "hf_case_finding_eligible_patients_vs10"
              category: "INCLUSION"
              time_window: "3_MONTHS"
            - cluster_id: "hf_case_finding_eligible_patients_vs11"
              category: "INCLUSION"
              time_window: "3_MONTHS"
            - cluster_id: "FEMALE"
              category: "EXCLUSION"
            - cluster_id: "hf_case_finding_eligible_patients_vs13"
              category: "EXCLUSION"
          thresholds:
            - population_group: "ALL_REGISTERED_PATIENTS"
              threshold_type: "NT_PROBNP"
              threshold_value: "400"
              threshold_operator: "GREATER_THAN"
              threshold_unit: "pg/ml"
              description: "Latest NT-proBNP greater than 400 without later cardiology referral"
              sort_order: 1
            - population_group: "ALL_REGISTERED_PATIENTS"
              threshold_type: "NT_PROBNP"
              threshold_value: "2000"
              threshold_operator: "GREATER_THAN"
              threshold_unit: "pg/ml"
              description: "NT-proBNP within 2 years greater than 2000 without later HF exclusion"
              sort_order: 2
            - population_group: "FEMALES_UNDER_40"
              threshold_type: "SPIRONOLACTONE_EXCLUSION"
              threshold_value: "40"
              threshold_operator: "LESS_THAN"
              threshold_unit: "years"
              description: "Exclude likely PCOS-pattern spironolactone use in women under 40 with hirsutism coding"
              sort_order: 3
        owner:
          name: EddieDavison92
    tests:
      - dbt_utils.at_least_one:
          column_name: person_id
      - cluster_ids_exist:
          arguments:
            cluster_ids: ENTRESTO_PRODUCTS
      - valuesets_have_codes:
          arguments:
            valuesets:
              - eligible_for_hf_casefinding_vs1
              - hf_case_finding_eligible_patients_vs1
              - hf_case_finding_eligible_patients_vs3
              - hf_case_finding_eligible_patients_vs4
              - hf_case_finding_eligible_patients_vs5
              - hf_case_finding_eligible_patients_vs6
              - hf_case_finding_eligible_patients_vs7
              - hf_case_finding_eligible_patients_vs8
              - hf_case_finding_eligible_patients_vs9
              - hf_case_finding_eligible_patients_vs10
              - hf_case_finding_eligible_patients_vs11
              - hf_case_finding_eligible_patients_vs13
    columns:
      - name: person_id
        description: Unique identifier for the person
        tests:
          - unique
          - not_null
