models:
  - name: dim_ltc_lcs_cf_cvd_63
    description: 'Age 40 to under 84 with QRISK2 ≥10%, on statins (12m), non-HDL >2.5 mmol/L. Excludes statin allergies/adverse reactions, not indicated, and high CVD risk review declines (36m).

      One row per person on statins with elevated non-HDL cholesterol.'
    config:
      meta:
        indicator:
          id: "LTC_LCS_CF_CVD_63"
          type: "CASE_FINDING"
          category: "CVD"
          clinical_domain: "Cardiovascular Disease Case Finding"
          name_short: "CVD_63: On statins, non-HDL >2.5"
          description_short: "On statins, non-HDL >2.5 mmol/L"
          description_long: >
            Age 40 to under 84, QRISK2 ≥10%, on statins (12m), non-HDL cholesterol
            >2.5 mmol/L. Excludes statin allergies/adverse reactions, not
            indicated, and high CVD risk review declines (36m) using valueset
            qrisk2_10_on_a_statin_and_a_non_hdl_25_vs1.
          is_qof: false
          source_column: "person_id"
          sort_order: "LTC_LCS_CVD_63"
          usage_contexts:
            - "LTC_LCS_DASHBOARD"
            - "CASE_FINDING_PROGRAMME"
          code_clusters:
            - cluster_id: "QRISK2_10YEAR"
              category: "INCLUSION"
            - cluster_id: "STAT_COD"
              category: "INCLUSION"
              time_window: "12_MONTHS"
            - cluster_id: "NON_HDL_CHOLESTEROL"
              category: "INCLUSION"
            - cluster_id: "STATIN_ALLERGY_ADVERSE_REACTION"
              category: "EXCLUSION"
            - cluster_id: "STATIN_NOT_INDICATED"
              category: "EXCLUSION"
          thresholds:
            - population_group: "ADULTS_40_UNDER_84"
              threshold_type: "AGE_RANGE"
              threshold_value: "40-<84"
              threshold_operator: "WITHIN"
              threshold_unit: "years"
              description: "Age 40 to under 84 years"
              sort_order: 1
            - population_group: "ADULTS_40_UNDER_84"
              threshold_type: "QRISK2_SCORE"
              threshold_value: "10"
              threshold_operator: "GREATER_THAN_OR_EQUAL"
              threshold_unit: "percentage"
              description: "QRISK2 ≥10%"
              sort_order: 2
            - population_group: "ADULTS_40_UNDER_84"
              threshold_type: "NON_HDL_CHOLESTEROL"
              threshold_value: "2.5"
              threshold_operator: "GREATER_THAN"
              threshold_unit: "mmol/L"
              description: "Non-HDL >2.5 mmol/L"
              sort_order: 3
        owner:
          name: EddieDavison92
    tests:
      - dbt_utils.at_least_one:
          column_name: person_id
      - cluster_ids_exist:
          arguments:
            cluster_ids: QRISK2_10YEAR, NON_HDL_CHOLESTEROL, STAT_COD, STATIN_ALLERGY_ADVERSE_REACTION, STATIN_NOT_INDICATED
      - valuesets_have_codes:
          arguments:
            valuesets:
              - qrisk2_10_on_a_statin_and_a_non_hdl_25_vs1