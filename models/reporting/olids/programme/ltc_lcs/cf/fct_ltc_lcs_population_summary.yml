models:
  - name: fct_ltc_lcs_population_summary
    description: 'Demographic cross-tabulation of LTC case finding indicators for
      population health analytics.

      Cross-tabulated data by age bands, ethnicity, and deprivation quintiles with
      population denominators for rate calculations.'
    config:
      meta:
        owner:
          name: EddieDavison92
    tests:
      - dbt_utils.at_least_one:
          column_name: age_band_10y
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - age_band_10y
              - ethnicity_category
              - imd_quintile
              - borough_registered
              - neighbourhood_registered
    columns:
      - name: age_band_10y
        tests:
          - not_null
