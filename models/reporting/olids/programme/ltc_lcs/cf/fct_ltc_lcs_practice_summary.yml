models:
  - name: fct_ltc_lcs_practice_summary
    description: 'Practice-level LTC case finding indicators aggregation optimised
      for PowerBI dashboards.

      One row per practice with case finding activity including demographic breakdowns
      and pre-calculated rates.'
    config:
      meta:
        owner:
          name: EddieDavison92
    tests:
      - dbt_utils.at_least_one:
          column_name: practice_code
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - practice_code
              - pcn_code
              - borough_registered
              - neighbourhood_registered
    columns:
      - name: practice_code
        tests:
          - not_null
