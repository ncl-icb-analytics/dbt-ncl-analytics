models:
  - name: dim_ltc_lcs_cf_cvd_66
    description: 'Age 75 to under 84, no QRISK2 (60m), not on statins (12m), no health
      check (24m). Excludes statin allergies/adverse reactions, not indicated,
      statin declines (60m), and high CVD risk review declines (36m).

      One row per person aged 75 to under 84 without recent CVD risk assessment.'
    config:
      meta:
        indicator:
          id: "LTC_LCS_CF_CVD_66"
          type: "CASE_FINDING"
          category: "CVD"
          clinical_domain: "Cardiovascular Disease Case Finding"
          name_short: "CVD_66: 75-<84, no recent QRISK2"
          description_short: "75-<84, no recent QRISK2"
          description_long: >
            Age 75 to under 84, no QRISK2 (60m), not on statins (12m), no health
            check (24m). Excludes statin allergies/adverse reactions, not
            indicated, statin declines (60m), and high CVD risk review declines
            (36m) using valueset
            aged_75_84_years_who_are_not_on_a_statin_and_no_qrisk_in_l5y_vs1.
          is_qof: false
          source_column: "person_id"
          sort_order: "LTC_LCS_CVD_66"
          usage_contexts:
            - "LTC_LCS_DASHBOARD"
            - "CASE_FINDING_PROGRAMME"
          code_clusters:
            - cluster_id: "QRISK2_10YEAR"
              category: "EXCLUSION"
              time_window: "60_MONTHS"
            - cluster_id: "STAT_COD"
              category: "EXCLUSION"
              time_window: "12_MONTHS"
            - cluster_id: "STATIN_ALLERGY_ADVERSE_REACTION"
              category: "EXCLUSION"
            - cluster_id: "STATIN_NOT_INDICATED"
              category: "EXCLUSION"
            - cluster_id: "STATINDEC_COD"
              category: "EXCLUSION"
              time_window: "60_MONTHS"
            - cluster_id: "CVD_REGISTER_CODES"
              category: "EXCLUSION"
          thresholds:
            - population_group: "ELDERLY_75_84"
              threshold_type: "AGE_RANGE"
              threshold_value: "75-<84"
              threshold_operator: "WITHIN"
              threshold_unit: "years"
              description: "Age 75 to under 84 years"
              sort_order: 1
        owner:
          name: EddieDavison92
    tests:
      - dbt_utils.at_least_one:
          column_name: person_id
      - cluster_ids_exist:
          cluster_ids: QRISK2_10YEAR, STAT_COD, 
            STATIN_ALLERGY_ADVERSE_REACTION, STATIN_NOT_INDICATED, STATINDEC_COD, 
            CVD_REGISTER_CODES
      - valuesets_have_codes:
          valuesets:
            - aged_75_84_years_who_are_not_on_a_statin_and_no_qrisk_in_l5y_vs1
