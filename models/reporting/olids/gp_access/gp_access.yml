version: 2
models:
  - name: fct_gp_urgent_same_day_access
    description: |
      GP Contract KPI: % of clinically urgent appointments seen same-day.

      Grain: practice x month. Numerator is urgent attended appointments
      booked and seen on the same day. Denominator is all urgent attended
      appointments with a booking date recorded.
    config:
      meta:
        owner:
          name: Eddie Davison
    columns:
      - name: practice_code
        tests:
          - not_null
      - name: report_month
        tests:
          - not_null

  - name: fct_gp_routine_7day_access
    description: |
      GP Contract KPI: % of routine appointments seen within 7 days of booking.

      Grain: practice x month. Numerator is routine attended appointments
      with days_to_appointment <= 7. Denominator is all routine attended
      appointments with a booking date recorded.
    config:
      meta:
        owner:
          name: Eddie Davison
    columns:
      - name: practice_code
        tests:
          - not_null
      - name: report_month
        tests:
          - not_null

  - name: fct_gp_routine_14day_access
    description: |
      GP Contract KPI: % of routine appointments seen within 14 days of booking.

      Grain: practice x month. Same methodology as 7-day but with 14-day threshold.
    config:
      meta:
        owner:
          name: Eddie Davison
    columns:
      - name: practice_code
        tests:
          - not_null
      - name: report_month
        tests:
          - not_null

  - name: fct_gp_dna_rate
    description: |
      GP appointment DNA (Did Not Attend) rate by practice and month.

      DNA rates vary significantly by deprivation and demographics.
      Join to practice-level demographics for equity analysis.
    config:
      meta:
        owner:
          name: Eddie Davison
    columns:
      - name: practice_code
        tests:
          - not_null
      - name: report_month
        tests:
          - not_null

  - name: fct_gp_appointments_by_mode
    description: |
      GP appointment volumes by contact mode and practitioner role group.

      Tracks digital transformation (F2F vs telephone vs online trends)
      and workforce mix. Includes average duration and wait times for
      costing and patient experience analysis.

      Grain: practice x month x contact_mode x practitioner_role_group.
    config:
      meta:
        owner:
          name: Eddie Davison
    columns:
      - name: practice_code
        tests:
          - not_null
      - name: report_month
        tests:
          - not_null
