models:
  - name: stg_c_ltcs_status_log
    description: "C-LTCS status log. One row per patient action."
    config:
      meta:
        owner:
          name: Emily Baldwin

    columns:
      - name: patient_id
        data_type: number
        description: "Unique patient identifier from commissioning data [sk_patient_id]"
        tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              column_type: varchar

      - name: area_code
        data_type: varchar
        description: "Area code at time of status log"

      - name: mdt_date
        data_type: date
        description: "MDT date for the status log entry"

      - name: action
        data_type: varchar
        description: "Action recorded in the status log"

      - name: action_date
        data_type: date
        description: "Date of the action"

      - name: criteria
        data_type: varchar
        description: "Criteria associated with the status log entry"