models:
  - name: stg_mhsds_mhs903warddetails
    description: 'Mental Health Services Data Set (MHSDS) ward details'
    config:
      meta:
        owner:
          name: Kate Homer


    columns:
      - name: mhs903_uniq_id
        description: Primary key.
        tests:
          - not_null

      - name: ward_code
        description: identifies the WARD  where ACTIVITY  during a Hospital Provider Spell  took place.

      - name: site_id_of_ward
        description: ORGANISATION SITE IDENTIFIER  of the  WARD  where the PATIENT was treated.

      - name: org_id_prov
        description: The organisation identifier for the provider
             
      - name: dmic_ccg_code
        description: The ICB (Integrated Care Board) that commissioned the spell.