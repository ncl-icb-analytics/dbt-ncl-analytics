models:
  - name: stg_mhsds_mpi
    description: Mental Health Services Data Set (MHSDS) Master Patient Index (MPI)
    config:
      meta:
        owner:
          name: Kate Homer
    columns:
      - name: sk
        description: row identifier (surrogate key)
        tests:
          - unique
          - not_null

      - name: sk_patient_id
        description: Pseudonymised NHS number (surrogate key for patient)

      - name: person_id
        description: MHSDS person identifier

      - name: local_patient_id
        description: Local patient identifier (from source system)

      - name: org_id_prov
        description: The organisation identifier for the provider

      - name: dmic_ccg_code
        description: The ICB (Integrated Care Board) that commissioned that the person is under the care of

    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          arguments:
            min_value: 1