models:
  - name: stg_mhsds_mhs502wardstay
    description: 'Mental Health Services Data Set (MHSDS) ward stays'
    config:
      meta:
        owner:
          name: Kate Homer
    columns:
      - name: uniq_serv_req_id
        description: Primary key - unique service request identifier
        tests:
          - unique
          - not_null

      - name: person_id
        description: MHSDS person identifier

      - name: org_id_prov
        description: The organisation identifier for the provider

      - name: site_id_of_treat
        description: Provider site where the ward stay took place.

      - name: uniq_ward_stay_id
        description: Unique identifier (prefixed by ORG_ID) allocated for each Ward Stay during a  Hospital Provider Spell

      - name: hospital_bed_type_name
        description: The ward where the activity took place during a hospital provider spell.

      - name: uniq_hosp_prov_spell_number
        description: unique identifier for each Hospital Provider Spell for a Health Care Provider
        
      - name: dmic_ccg_code
        description: The ICB (Integrated Care Board) that commissioned the spell.


    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          arguments:
            min_value: 1