models:
  - name: stg_aic_int_efi2_scores
    description: Staging model for AI Centre EFI2 scores by person.
    config:
      meta:
        owner:
          name: em-baldwin
    columns:
      - name: person_id
        description: Person identifier.
        tests:
          - unique
          - not_null
      - name: end_date
        description: Effective end date associated with the EFI2 score.
      - name: efi_score
        description: Electronic frailty index score.
      - name: category
        description: EFI2 score category.
      - name: age_at_end
        description: Person age at end date.
      - name: gender
        description: Person gender.
      - name: date_of_death
        description: Person date of death where present.
    tests:
      - dbt_utils.recency:
          config:
            severity: warn
          arguments:
            field: end_date
            datepart: month
            interval: 2
