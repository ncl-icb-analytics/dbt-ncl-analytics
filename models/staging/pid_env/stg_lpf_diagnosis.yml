version: 2

models:
  - name: stg_lpf_diagnosis
    description: |
      Staging layer for local provider flow diagnosis data.
      Transformations: Removes deleted records, removes nulls on DiagnosisID, deduplicates by latest version.
      Source: raw_lpf_diagnosis

    config:
      meta:
        owner:
          name: Data Team

    columns:
      - name: metadata_record_ingestion_timestamp
        description: "Timestamp when record was ingested"
        data_tests:
          - not_null

tests:
  - name: concept_mapping_diagnosis
    description: "Diagnosis codes must have code system and display"
    sql: |
      select * from {{ ref('stg_lpf_diagnosis') }}
      where diagnosis_code_id is not null and (diagnosis_code_system_id is null or diagnosis_display is null)
    config:
      severity: warn
      store_failures: true

  - name: referential_integrity_diagnosis
    description: "All diagnosis records must reference valid persons"
    sql: |
      select * from {{ ref('stg_lpf_diagnosis') }} where "PersonID" is null
    config:
      severity: error
      store_failures: true

  - name: data_freshness_diagnosis
    description: "Data should be recent (last 30 days)"
    sql: |
      with freshness as (
        select
          max(metadata_record_ingestion_timestamp) as latest_ingestion,
          datediff(day, max(metadata_record_ingestion_timestamp), current_timestamp()) as days_since_latest
        from {{ ref('stg_lpf_diagnosis') }}
      )
      select * from freshness where days_since_latest > 30
    config:
      severity: warn
      store_failures: true
