version: 2

models:
  - name: stg_lpf_procedure
    description: |
      Staging layer for local provider flow procedure data.
      Transformations: Removes deleted records, removes nulls on ProcedureID, deduplicates by latest version.
      Source: raw_lpf_procedure

    config:
      meta:
        owner:
          name: Data Team

    columns:
      - name: metadata_record_ingestion_timestamp
        description: "Timestamp when record was ingested"
        data_tests:
          - not_null

tests:
  - name: concept_mapping_procedure
    description: "Procedure codes must have code system and display"
    sql: |
      select * from {{ ref('stg_lpf_procedure') }}
      where procedure_code_id is not null and (procedure_code_system_id is null or procedure_display is null)
    config:
      severity: warn
      store_failures: true

  - name: referential_integrity_procedure
    description: "All procedure records must reference valid persons"
    sql: |
      select * from {{ ref('stg_lpf_procedure') }} where person_id is null
    config:
      severity: error
      store_failures: true

  - name: data_freshness_procedure
    description: "Data should be recent (last 30 days)"
    sql: |
      with freshness as (
        select
          max(metadata_record_ingestion_timestamp) as latest_ingestion,
          datediff(day, max(metadata_record_ingestion_timestamp), current_timestamp()) as days_since_latest
        from {{ ref('stg_lpf_procedure') }}
      )
      select * from freshness where days_since_latest > 30
    config:
      severity: warn
      store_failures: true
