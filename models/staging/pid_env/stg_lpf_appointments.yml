version: 2

models:
  - name: stg_lpf_appointments
    description: |
      Staging layer for local provider flow appointments data.
      Transformations: Removes deleted records, removes nulls on AppointmentID, deduplicates by latest version.
      Source: raw_lpf_appointments

    config:
      meta:
        owner:
          name: Data Team

    columns:
      - name: metadata_record_ingestion_timestamp
        description: "Timestamp when record was ingested"
        data_tests:
          - not_null

tests:
  - name: referential_integrity_appointments
    description: "All appointment records must reference valid persons"
    sql: |
      select * from {{ ref('stg_lpf_appointments') }}
      where "PersonID" is null
    config:
      severity: error
      store_failures: true

  - name: data_freshness_appointments
    description: "Data should be recent (last 30 days)"
    sql: |
      with freshness as (
        select
          max(metadata_record_ingestion_timestamp) as latest_ingestion,
          datediff(day, max(metadata_record_ingestion_timestamp), current_timestamp()) as days_since_latest
        from {{ ref('stg_lpf_appointments') }}
      )
      select * from freshness where days_since_latest > 30
    config:
      severity: warn
      store_failures: true

  - name: data_history_appointments
    description: "Data should cover records from 01/04/2021 onwards"
    sql: |
      select * from {{ ref('stg_lpf_appointments') }}
      where metadata_record_ingestion_timestamp < '2021-04-01' limit 1
    config:
      severity: warn
      store_failures: true
