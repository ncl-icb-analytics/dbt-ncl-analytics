version: 2

models:
  - name: stg_lpf_immunisation
    description: |
      Staging layer for local provider flow immunisation data.
      Transformations: Removes deleted records, removes nulls on ImmunisationID, deduplicates by latest version.
      Source: raw_lpf_immunisation

    config:
      meta:
        owner:
          name: Data Team

    columns:
      - name: metadata_record_ingestion_timestamp
        description: "Timestamp when record was ingested"
        data_tests:
          - not_null

tests:
  - name: concept_mapping_immunisation
    description: "Immunisation codes must have code system and display"
    sql: |
      select * from {{ ref('stg_lpf_immunisation') }}
      where "VaccineCodeID" is not null and ("VaccineCodeSystemID" is null or "VaccineDisplay" is null)
    config:
      severity: warn
      store_failures: true

  - name: referential_integrity_immunisation
    description: "All immunisation records must reference valid persons"
    sql: |
      select * from {{ ref('stg_lpf_immunisation') }} where person_id is null
    config:
      severity: error
      store_failures: true

  - name: data_freshness_immunisation
    description: "Data should be recent (last 30 days)"
    sql: |
      with freshness as (
        select
          max(metadata_record_ingestion_timestamp) as latest_ingestion,
          datediff(day, max(metadata_record_ingestion_timestamp), current_timestamp()) as days_since_latest
        from {{ ref('stg_lpf_immunisation') }}
      )
      select * from freshness where days_since_latest > 30
    config:
      severity: warn
      store_failures: true
