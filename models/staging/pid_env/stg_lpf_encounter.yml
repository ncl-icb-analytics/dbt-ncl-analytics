version: 2

models:
  - name: stg_lpf_encounter
    description: |
      Staging layer for local provider flow encounter data.
      Transformations: Removes deleted records, removes nulls on EncounterID, deduplicates by latest version.
      Source: raw_lpf_encounter

    config:
      meta:
        owner:
          name: Data Team

    columns:
      - name: metadata_record_ingestion_timestamp
        description: "Timestamp when record was ingested"
        data_tests:
          - not_null

tests:
  - name: referential_integrity_encounter
    description: "All encounters must reference valid persons"
    sql: |
      select * from {{ ref('stg_lpf_encounter') }} where "PersonID" is null
    config:
      severity: error
      store_failures: true

  - name: encounter_type_specified
    description: "All encounters must have an encounter type code"
    sql: |
      select * from {{ ref('stg_lpf_encounter') }}
      where "EncounterTypeCodeID" is null
    config:
      severity: warn
      store_failures: true

  - name: data_freshness_encounter
    description: "Data should be recent (last 30 days)"
    sql: |
      with freshness as (
        select
          max(metadata_record_ingestion_timestamp) as latest_ingestion,
          datediff(day, max(metadata_record_ingestion_timestamp), current_timestamp()) as days_since_latest
        from {{ ref('stg_lpf_encounter') }}
      )
      select * from freshness where days_since_latest > 30
    config:
      severity: warn
      store_failures: true
