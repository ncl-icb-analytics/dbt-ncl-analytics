version: 2

models:
  - name: stg_lpf_medication
    description: |
      Staging layer for local provider flow medication data.
      Transformations: Removes deleted records, removes nulls on MedicationID, deduplicates by latest version.
      Source: raw_lpf_medication

    config:
      meta:
        owner:
          name: Data Team

    columns:
      - name: metadata_record_ingestion_timestamp
        description: "Timestamp when record was ingested"
        data_tests:
          - not_null

tests:
  - name: concept_mapping_medication
    description: "Medication codes must have code system and display"
    sql: |
      select * from {{ ref('stg_lpf_medication') }}
      where medication_code_id is not null and (medication_code_system_id is null or medication_display is null)
    config:
      severity: warn
      store_failures: true

  - name: referential_integrity_medication
    description: "All medication records must reference valid persons"
    sql: |
      select * from {{ ref('stg_lpf_medication') }} where person_id is null
    config:
      severity: error
      store_failures: true

  - name: data_freshness_medication
    description: "Medication data should be recent (last 30 days) for active monitoring"
    sql: |
      with freshness as (
        select
          max(metadata_record_ingestion_timestamp) as latest_ingestion,
          datediff(day, max(metadata_record_ingestion_timestamp), current_timestamp()) as days_since_latest
        from {{ ref('stg_lpf_medication') }}
      )
      select * from freshness where days_since_latest > 30
    config:
      severity: warn
      store_failures: true
