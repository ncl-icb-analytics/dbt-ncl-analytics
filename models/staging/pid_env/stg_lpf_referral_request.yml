version: 2

models:
  - name: stg_lpf_referral_request
    description: |
      Staging layer for local provider flow referral request data.
      Transformations: Removes deleted records, removes nulls on ReferralRequestID, deduplicates by latest version.
      Source: raw_lpf_referral_request

    config:
      meta:
        owner:
          name: Data Team

    columns:
      - name: metadata_record_ingestion_timestamp
        description: "Timestamp when record was ingested"
        data_tests:
          - not_null

tests:
  - name: concept_mapping_referral
    description: "Referral priority codes must have code system and display"
    sql: |
      select * from {{ ref('stg_lpf_referral_request') }}
      where "PriorityCodeID" is not null and ("PriorityCodeSystemID" is null or "PriorityDisplay" is null)
    config:
      severity: warn
      store_failures: true

  - name: referential_integrity_referral
    description: "All referral records must reference valid persons"
    sql: |
      select * from {{ ref('stg_lpf_referral_request') }} where "PersonID" is null
    config:
      severity: error
      store_failures: true

  - name: referral_status_specified
    description: "All referrals must have a status code"
    sql: |
      select * from {{ ref('stg_lpf_referral_request') }}
      where "StatusCodeID" is null
    config:
      severity: warn
      store_failures: true

  - name: data_freshness_referral
    description: "Referral data should be current (last 7 days typical for waiting list tracking)"
    sql: |
      with freshness as (
        select
          max(metadata_record_ingestion_timestamp) as latest_ingestion,
          datediff(day, max(metadata_record_ingestion_timestamp), current_timestamp()) as days_since_latest
        from {{ ref('stg_lpf_referral_request') }}
      )
      select * from freshness where days_since_latest > 7
    config:
      severity: warn
      store_failures: true
