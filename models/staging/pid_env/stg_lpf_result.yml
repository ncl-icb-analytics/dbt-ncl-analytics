version: 2

models:
  - name: stg_lpf_result
    description: |
      Staging layer for local provider flow result data.
      Transformations: Removes deleted records, removes nulls on ResultID, deduplicates by latest version.
      Source: raw_lpf_result

    config:
      meta:
        owner:
          name: Data Team

    columns:
      - name: metadata_record_ingestion_timestamp
        description: "Timestamp when record was ingested"
        data_tests:
          - not_null

tests:
  - name: concept_mapping_result
    description: "Result observation codes must have code system and display"
    sql: |
      select * from {{ ref('stg_lpf_result') }}
      where observation_code_id is not null and (observation_code_system_id is null or observation_display is null)
    config:
      severity: warn
      store_failures: true

  - name: referential_integrity_result
    description: "All result records must reference valid encounters"
    sql: |
      select * from {{ ref('stg_lpf_result') }} where encounter_id is null
    config:
      severity: error
      store_failures: true

  - name: result_value_quality
    description: "Results with numeric values should be well populated"
    sql: |
      select * from {{ ref('stg_lpf_result') }}
      where "ValueType" = 'numeric' and ("Value" is null or "ValueUnit" is null)
    config:
      severity: warn
      store_failures: true

  - name: data_freshness_result
    description: "Lab result data should be recent (last 30 days)"
    sql: |
      with freshness as (
        select
          max(metadata_record_ingestion_timestamp) as latest_ingestion,
          datediff(day, max(metadata_record_ingestion_timestamp), current_timestamp()) as days_since_latest
        from {{ ref('stg_lpf_result') }}
      )
      select * from freshness where days_since_latest > 30
    config:
      severity: warn
      store_failures: true
