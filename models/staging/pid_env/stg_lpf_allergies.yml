version: 2

models:
  - name: stg_lpf_allergies
    description: |
      Staging layer for local provider flow allergies data.
      
      Transformations applied:
      - Removes deleted records (delete_ind = 'Y')
      - Removes records with null allergy_id
      - Deduplicates by taking the latest version of each allergy
      
      Source: raw_lpf_allergies (DATA_LAKE.LOCAL_PROVIDER_FLOWS.ALLERGIES)

    config:
      meta:
        owner:
          name: Data Team

    columns:
      - name: metadata_file_path
        description: "Metadata file path"

      - name: metadata_file_row_number
        description: "Row number in the metadata file"

      - name: metadata_record_ingestion_timestamp
        description: "Timestamp when record was ingested"

      - name: metadata_file_content_key
        description: "Content key for the metadata file"

      - name: metadata_file_last_modified
        description: "Last modified timestamp of the metadata file"

      - name: allergy_id
        description: "Unique identifier for the allergy record"
        data_tests:
          - unique
          - not_null

      - name: version
        description: "Version number of the record"

      - name: person_id
        description: "Unique identifier for the person"
        data_tests:
          - not_null

      - name: encounter_id
        description: "Unique identifier for the encounter"

      - name: allergen_code_id
        description: "Code ID for the allergen"

      - name: allergen_code_system_id
        description: "Code system ID for the allergen"

      - name: allergen_display
        description: "Display name of the allergen"

      - name: onset_date
        description: "Date when the allergy was identified"

      - name: resolved_date
        description: "Date when the allergy was resolved"

      - name: reaction_code_id
        description: "Code ID for the reaction"

      - name: reaction_code_system_id
        description: "Code system ID for the reaction"

      - name: reaction_display
        description: "Display name of the reaction"

      - name: severity_code_id
        description: "Code ID for severity"

      - name: severity_code_system_id
        description: "Code system ID for severity"

      - name: severity_display
        description: "Display name of severity"

      - name: status_code_id
        description: "Code ID for status"

      - name: status_code_system_id
        description: "Code system ID for status"

      - name: status_display
        description: "Display name of status"

      - name: category_code_id
        description: "Code ID for category"

      - name: category_code_system_id
        description: "Code system ID for category"

      - name: category_display
        description: "Display name of category"

      - name: type_code_id
        description: "Code ID for type"

      - name: type_code_system_id
        description: "Code system ID for type"

      - name: type_display
        description: "Display name of type"

      - name: criticality_code_id
        description: "Code ID for criticality"

      - name: criticality_code_system_id
        description: "Code system ID for criticality"

      - name: criticality_display
        description: "Display name of criticality"

      - name: asserted_date
        description: "Date when the allergy was asserted"

# ============================================================================
# DATA QUALITY TESTS
# ============================================================================

tests:
  # CONCEPT MAPPING VALIDATION
  # Verify allergen codes map to valid concept entries with code system + display
  - name: allergen_concept_mapping_valid
    description: "Allergen codes must have corresponding code system and display value"
    sql: |
      select *
      from {{ ref('stg_lpf_allergies') }}
      where allergen_code_id is not null
        and (allergen_code_system_id is null or allergen_display is null)
    config:
      severity: warn
      store_failures: true

  # REFERENTIAL INTEGRITY CHECKS
  # Person ID should reference valid person records (basic non-null check for now)
  - name: person_id_referential_integrity
    description: "All allergy records must reference valid persons (person_id not null)"
    sql: |
      select *
      from {{ ref('stg_lpf_allergies') }}
      where person_id is null
    config:
      severity: error
      store_failures: true

  # Encounter ID should reference valid encounter records (when not null)
  - name: encounter_id_referential_integrity
    description: "Encounter IDs when present must be valid (placeholder check: not empty string)"
    sql: |
      select *
      from {{ ref('stg_lpf_allergies') }}
      where encounter_id is not null and encounter_id = ''
    config:
      severity: warn
      store_failures: true

  # CODE SYSTEM SPECIFICATION
  # All code columns should have corresponding code_system_id
  - name: code_systems_specified
    description: "All code columns must specify their coding system"
    sql: |
      select *
      from {{ ref('stg_lpf_allergies') }}
      where allergen_code_id is not null and allergen_code_system_id is null
         or reaction_code_id is not null and reaction_code_system_id is null
         or severity_code_id is not null and severity_code_system_id is null
         or status_code_id is not null and status_code_system_id is null
         or category_code_id is not null and category_code_system_id is null
         or type_code_id is not null and type_code_system_id is null
         or criticality_code_id is not null and criticality_code_system_id is null
    config:
      severity: warn
      store_failures: true

  # FILE AND COLUMN COMPLETENESS
  # Core columns completeness check
  - name: core_columns_completeness
    description: "Core columns should have <1% NULL values"
    sql: |
      with completeness as (
        select
          count(*) as total_rows,
          count(case when allergy_id is null then 1 end) as null_allergy_id,
          count(case when person_id is null then 1 end) as null_person_id,
          count(case when allergen_code_id is null then 1 end) as null_allergen_code_id,
          count(case when status_code_id is null then 1 end) as null_status_code_id,
          round(100.0 * count(case when allergy_id is null then 1 end) / count(*), 2) as pct_null_allergy_id,
          round(100.0 * count(case when person_id is null then 1 end) / count(*), 2) as pct_null_person_id,
          round(100.0 * count(case when allergen_code_id is null then 1 end) / count(*), 2) as pct_null_allergen_code_id,
          round(100.0 * count(case when status_code_id is null then 1 end) / count(*), 2) as pct_null_status_code_id
        from {{ ref('stg_lpf_allergies') }}
      )
      select *
      from completeness
      where pct_null_allergy_id > 1
         or pct_null_person_id > 1
         or pct_null_allergen_code_id > 5  -- More lenient threshold for allergen codes
         or pct_null_status_code_id > 5    -- More lenient threshold for status codes
    config:
      severity: warn
      store_failures: true

  # DATA FRESHNESS
  # Verify latest data is from active monitoring period
  - name: data_freshness_check
    description: "Data should be recent (last 30 days for active monitoring)"
    sql: |
      with freshness_check as (
        select
          max(metadata_record_ingestion_timestamp) as latest_ingestion,
          current_timestamp() as current_time,
          datediff(day, max(metadata_record_ingestion_timestamp), current_timestamp()) as days_since_latest
        from {{ ref('stg_lpf_allergies') }}
      )
      select *
      from freshness_check
      where days_since_latest > 30
    config:
      severity: warn
      store_failures: true

  # DATA HISTORY
  # Verify data coverage from baseline date (01/04/2021)
  - name: data_history_coverage
    description: "Data should cover records from 01/04/2021 onwards"
    sql: |
      select *
      from {{ ref('stg_lpf_allergies') }}
      where metadata_record_ingestion_timestamp < '2021-04-01'
      limit 1
    config:
      severity: warn
      store_failures: true

  # CONCEPT MAPPING SUCCESS RATE
  # Verify >99.999% of events map to valid concepts
  - name: concept_mapping_success_rate
    description: "At least 99.999% of allergen events should have valid concept mapping"
    sql: |
      with mapping_stats as (
        select
          count(*) as total_records,
          count(case when allergen_code_id is not null and allergen_code_system_id is not null and allergen_display is not null then 1 end) as mapped_records,
          round(100.0 * count(case when allergen_code_id is not null and allergen_code_system_id is not null and allergen_display is not null then 1 end) / nullif(count(*), 0), 4) as mapping_success_rate
        from {{ ref('stg_lpf_allergies') }}
        where allergen_code_id is not null
      )
      select *
      from mapping_stats
      where mapping_success_rate < 99.999
    config:
      severity: warn
      store_failures: true
