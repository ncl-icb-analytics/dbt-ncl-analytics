models:
  - name: cltcs_status_log_most_recent
    description: "Most recent C-LTCS status log row per patient. One row per patient (latest by action_date)."
    config:
      meta:
        owner:
          name: Emily Baldwin

    columns:
      - name: patient_id
        data_type: number
        description: "Unique patient identifier from commissioning data [sk_patient_id]"
        data_tests:
          - unique
          - not_null

      - name: area_code
        data_type: varchar
        description: "Area code (PCN of registered GP practice in this context) at time of status log"

      - name: intervention_date
        data_type: date
        description: "Date of the intervention referred onto by triage e.g., MDT date if accepted onto MDT"

      - name: action
        data_type: varchar
        description: "Action recorded in the status log"

      - name: action_date
        data_type: date
        description: "Date of the action"

      - name: detail
        data_type: varchar
        description: "Additional detail associated with the status log entry"

      - name: intervention_name
        data_type: varchar
        description: "Name of the intervention referred onto by triage e.g., MDT"