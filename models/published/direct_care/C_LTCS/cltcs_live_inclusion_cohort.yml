
models:
  - name: cltcs_live_inclusion_cohort
    description: Patients eligible for C-LTCS based on multimorbidity and 
      outpatient activity. One row per patient with eligibility flag.
    config:
      meta:
        owner:
          name: Emily Baldwin
    columns:
      - name: patient_id
        data_type: number
        description: "Unique patient identifier from commissioning data [sk_patient_id]"
        data_tests:
          - unique:
              config:
                severity: warn
                warn_if: ">10"
          - not_null

      - name: re_id_key
        data_type: varchar
        description: "Unique patient identifier for LDS re-identification service [hx_flake]"

      - name: olids_id
        data_type: varchar
        description: "Unique patient identified from OLIDS data [person_id]"

      - name: practice_code
        data_type: varchar
        description: "Current registered GP practice ODS code"

      - name: practice_name
        data_type: varchar
        description: "Current registered GP practice name"

      - name: area_type
        data_type: varchar
        description: "Area type (PCN of registered GP practice in this context)"

      - name: area_code
        data_type: varchar
        description: "Area code (PCN in this context)"

      - name: area_name
        data_type: varchar
        description: "Area name (PCN name in this context)"

      - name: main_language
        data_type: varchar
        description: "Patient primary spoken language"

      - name: age
        data_type: number
        description: "Patient age in years"

      - name: gender
        data_type: varchar
        description: "Patient gender"

      - name: ethnicity_category
        data_type: varchar
        description: "Patient ethnicity category"

      - name: eligible
        data_type: number
        description: "Flag for eligibility for inclusion in the C-LTCS cohort (1=eligible,
          0=not eligible)"

      - name: fragmented_sk_patient_id_flag
        data_type: number
        description: "Flag indicating multiple OLIDS person_ids mapped to a single commissioning patient_id (1=fragmented mapping, 0=not fragmented)"

      - name: fragmented_person_id_flag
        data_type: number
        description: "Flag indicating multiple commissioning patient_ids mapped to a single OLIDS person_id (1=fragmented mapping, 0=not fragmented)"
