models:
  - name: cltcs_score_coordination
    description: "Coordination sub-score for C-LTCS cohort. One row per patient. Derived from waiting lists, OP activity, GP/A&E usage, APC LOS and multi-provider flags."
    config:
      meta:
        owner:
          name: Emily Baldwin
    columns:
      - name: patient_id
        data_type: number
        description: "Unique patient identifier from commissioning data"
        data_tests:
          - unique
          - not_null

      - name: area_code
        data_type: varchar
        description: "Area code (PCN  in this context)"
        data_tests:
          - not_null

      - name: score_coordination
        data_type: number
        description: "Coordination sub-score (higher indicates higher coordination-related risk)"
