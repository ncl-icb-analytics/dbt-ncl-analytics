models:
  - name: cltcs_score_activation
    description: "Activation sub-score for C-LTCS cohort. One row per patient. Derived from A&E/GP ratio, language, SMI/LD/musculoskeletal flags and OP/OE ratio."
    config:
      meta:
        owner:
          name: Emily Baldwin
    columns:
      - name: patient_id
        data_type: number
        description: "Unique patient identifier from commissioning data"
        data_tests:
          - unique
          - not_null

      - name: area_code
        data_type: varchar
        description: "Area code (PCN in this context)"
        data_tests:
          - not_null

      - name: score_activation
        data_type: number
        description: "Activation sub-score (higher indicates higher activation-related risk)"
