models:
  - name: cltcs_score_frailty
    description: "Frailty sub-score for C-LTCS cohort. One row per patient. Derived from age, frailty-related conditions, falls/emergency activity, BP control, comorbidity burden and AIC eFI2 score."
    config:
      meta:
        owner:
          name: Emily Baldwin
    columns:
      - name: patient_id
        data_type: number
        description: "Unique patient identifier from commissioning data"
        data_tests:
          - unique
          - not_null

      - name: area_code
        data_type: varchar
        description: "Area code (PCN in this context)"
        data_tests:
          - not_null

      - name: score_frailty
        data_type: number
        description: "Frailty sub-score (higher indicates higher frailty and complexity risk)"
