models:
  - name: smi_cf_secondary_care_dm
    description: Person Level Intermediate table holding Case Finding data for 
      people on the SMI register who have had an inpatient spell at NLFT in the last 6 months or who have a current inpatient spell. This includes number of checks missed and 
      vulnerabilities.


    config:
      meta:
        owner:
          name: KateHomer55
    columns:
      - name: person_id
        description: Unique identifier for the person
        tests:
          - not_null