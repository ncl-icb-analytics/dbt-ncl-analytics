version: 2

models:
  - name: sem_olids_population
    description: |
      OLIDS Population Health semantic view. OLIDS is the One London
      Integrated Data Set — primary care data from system suppliers,
      unified by the One London team.

      Semantic model for NCL population health analysis combining
      demographics, all condition registers (QOF Business Rules v50),
      diabetes type classification, and person status into a unified
      semantic layer for Cortex Analyst and governed metric definitions.

      Includes ESP 2013 weights (age_band_esp, esp_weight, esp_proportion)
      for age-standardised rate calculation across areas.

      Grain: One row per person (current state)

      Tables Included:
      - dim_person_demographics: Core demographics, registration, geography
      - dim_person_conditions: Boolean flags for all 38 conditions + diabetes type + summary counts
      - dim_person_status_summary: Vulnerability, risk behaviours, polypharmacy, data sharing
      - esp_2013: European Standard Population weights

    config:
      materialized: semantic_view
      schema: SEMANTIC
      meta:
        owner:
          name: Eddie Davison
