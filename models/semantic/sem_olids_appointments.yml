version: 2
models:
  - name: sem_olids_appointments
    description: |
      OLIDS GP Appointments semantic view. Combines cleaned appointment data
      with patient demographics, long-term condition flags and PSSRU unit
      costs for GP access KPI reporting, DNA equity analysis, workforce mix
      and appointment costing.

      Grain: one row per appointment (appointment_id).

      Scope: built from int_appointment_gp_clean_recent which restricts
      to the rolling last 60 months of appointment data. This matches
      OLIDS retention — anything older has been silently truncated to
      currently-registered patients only and would bias historical
      analysis. Apply the same 5-year caveat to any historical
      comparisons drawn from this view.

      Practice attribution: appointment-owner side via
      record_owner_organisation_code. Practice / PCN / borough / age fields
      sourced from dim_person_demographics are the patient's CURRENT
      registration / age and are prefixed `current_` so historical
      appointments are not mis-attributed when patients re-register or age
      into a new band. Use age_at_event for event-time age cohorting.
    config:
      materialized: semantic_view
      schema: SEMANTIC
      meta:
        owner:
          name: Eddie Davison
