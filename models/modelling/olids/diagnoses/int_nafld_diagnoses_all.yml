models:
  - name: int_nafld_diagnoses_all
    description: 'MASLD / NAFLD diagnosis observations for liver health assessment.

      Key Features:

      • Uses the terminology-managed MASLD_DX_CODES cluster

      • Captures modern MASLD terminology and legacy NAFLD/NASH diagnoses

      • Supports liver health assessment and LTC LCS register logic

      Purpose: Provide observation-level MASLD / NAFLD diagnosis data for
      downstream register models.'
    config:
      meta:
        owner:
          name: EddieDavison92
    tests:
      - dbt_utils.at_least_one:
          column_name: id
    columns:
      - name: id
        description: 'Unique identifier for the clinical observation'
        tests:
          - unique
          - not_null
      - name: person_id
        description: 'Unique identifier for the person'
      - name: clinical_effective_date
        description: 'Date when the MASLD / NAFLD observation was recorded'
      - name: concept_code
        description: 'SNOMED concept code for the MASLD / NAFLD diagnosis'
      - name: concept_display
        description: 'Human-readable description of the MASLD / NAFLD diagnosis'
      - name: source_cluster_id
        description: 'Source cluster identifier, expected to be MASLD_DX_CODES'
      - name: patient_id
        description: 'Patient identifier from source system'
      - name: is_diagnosis_code
        description: 'Boolean flag indicating diagnosis code (always TRUE for these observations)'
      - name: nafld_observation_type
        description: 'Type of liver diagnosis observation'
      - name: numeric_value
        description: 'Numeric result value from the observation if available'
