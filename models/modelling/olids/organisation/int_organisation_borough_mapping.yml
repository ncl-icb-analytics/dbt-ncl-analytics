models:
  - name: int_organisation_borough_mapping
    description: 'Organisation borough and legacy sub-ICB mapping for London practices and PCNs.

      Key features:

      • Borough derived from historic CCG relationships in OrganisationDescendent (contractual
      view of how practices were commissioned through NHSE, not strict geography).

      • One row per practice. Multiple historic CCG paths are resolved by preferring the
      most recent relationship (active first, then latest end date, then latest start date).

      • Sub-ICB (legacy NCL / NWL / etc.) derived from the RO98 commissioner''s RO261 parent
      in ODS, excluding the merged WNL ICB (Z9B2Z). Preserves the pre-2026-04-01 QMJ/QRV
      identities NHSE retained as ended-but-extant parent edges. Non-merged ICBs resolve
      to themselves.

      • PCN borough from majority member borough; PCN sub-ICB from the PCN''s single
      commissioner (verified one-to-one).

      • Special handling: Medicus Select Care (Y03103) pinned to Enfield.

      Purpose: single source of truth for borough and legacy sub-ICB context consumed by
      dim_practice and dim_pcn.'
    config:
      meta:
        owner:
          name: EddieDavison92
    data_tests:
      # Every in-scope practice should resolve to a sub-ICB via its commissioner.
      - dbt_utils.expression_is_true:
          arguments:
            expression: sub_icb_code IS NOT NULL
    columns:
      - name: practice_code
        description: 'GP practice identifier. Unique after the practice-grain dedup.'
        tests:
          - not_null
          - unique
      - name: borough_registered
        description: 'Borough assignment for the practice based on historic CCG relationships.
          Contractual view — boundary practices stay with the CCG that contracted them.'
      - name: practice_historic_ccg
        description: 'Historic CCG code used for the borough assignment.'
      - name: commissioner_code
        description: 'Current RO98 sub-ICB / place-based partnership commissioner code from
          OrganisationMatrixPracticeView (e.g. 93C, W2U3Z, A3A8R, 72Q, 36L).'
      - name: sub_icb_code
        description: 'Legacy ICB ODS code. For WNL (merged Apr 2026): QMJ (NCL) or QRV
          (NWL) depending on the commissioner''s pre-merger parent. For ICBs that have
          not merged: the ICB code itself (QMF, QKK, QWE).'
        tests:
          - not_null
      - name: sub_icb_name
        description: 'Legacy ICB display name sourced from Dictionary.Organisation.'
        tests:
          - not_null
      - name: network_code
        description: 'Primary Care Network (PCN) identifier that the practice belongs to.'
      - name: pcn_borough
        description: 'Borough assignment for the PCN based on majority member borough.'
      - name: pcn_borough_practice_count
        description: 'Number of practices within the PCN assigned to this borough.'
      - name: pcn_sub_icb_code
        description: 'Legacy sub-ICB code at the PCN grain, derived from the PCN''s
          commissioner via ODS (same logic as sub_icb_code).'
      - name: pcn_sub_icb_name
        description: 'Legacy sub-ICB display name at the PCN grain.'
