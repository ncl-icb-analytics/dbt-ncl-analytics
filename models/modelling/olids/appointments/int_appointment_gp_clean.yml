version: 2
models:
  - name: int_appointment_gp_clean
    description: |
      Cleaned OLIDS GP appointments. Grain: one row per appointment.

      Scope: Care Related Encounters with a clinical practitioner.
      Excludes future/available slots, admin practitioner roles, and
      non-Care-Related-Encounter contexts.

      Two role groupings (sourced from the sds_role_groups seed):
      * practitioner_role_group — analytical grouping preserving ARRS
        workforce signal (GP, Nurse, Pharmacist, HCA, PA, Paramedic,
        Physio, Care Navigator, etc.)
      * sds_role_group — official NHS Digital 4-group taxonomy for
        alignment with NHS Digital Appointments in General Practice

      Two cost columns (sourced from pssru_unit_costs_2024 seed,
      adjusted via uk_cost_indices seed):
      * appointment_cost_gbp_base_prices — always in PSSRU 2023/24
        real-terms prices, use for cross-year comparisons
      * appointment_cost_gbp_nominal — in the appointment's own fiscal
        year prices (GDP deflator adjusted), use for contemporaneous
        reporting. NULL for pre-2000 fiscal years (outside seed
        coverage — intentional data quality signal).

      cost_is_proxy flags rows where the unit cost is borrowed from
      another role's PSSRU rate (ARRS roles without a direct PSSRU
      figure). Filter WHERE cost_is_proxy = FALSE to restrict to direct
      PSSRU figures only.

      For full cost methodology and per-role rationale see the
      pssru_unit_costs_2024 and uk_cost_indices seed descriptions.

      All reporting models (fct_gp_* and sem_olids_appointments) build
      from int_appointment_gp_clean_recent rather than this model
      directly. The recent view restricts to the last 60 months of
      data to match OLIDS retention. Use this unfiltered model only
      for ad-hoc analyses that need pre-5-year history (with the
      OLIDS retention caveat in mind — leavers are silently truncated).
    config:
      meta:
        owner:
          name: Eddie Davison
    data_tests:
      - dbt_utils.at_least_one:
          arguments:
            column_name: appointment_id
    columns:
      - name: appointment_id
        description: Unique appointment identifier from OLIDS
        data_tests:
          - not_null
          - unique
      - name: person_id
        description: Person identifier (deduplicated across patient IDs)
        data_tests:
          - not_null
      - name: patient_id
        description: Patient identifier
      - name: organisation_id
        description: Practice organisation identifier
      - name: schedule_id
        description: Parent schedule identifier (appointment book session)
      - name: start_date
        description: Appointment start date and time
      - name: date_time_booked
        description: When the appointment was booked
      - name: planned_duration
        description: Raw planned slot duration in minutes (unreliable for untimed schedules)
      - name: actual_duration
        description: >
          Raw actual duration in minutes. Unreliable when longer than planned
          because GPs often press the "send in" / "left" buttons well after
          the real event.
      - name: duration_minutes
        description: >
          Cleaned duration in minutes for costing and averaging.
          NULL for untimed/list schedules (where the source duration is
          inherited from a whole session and meaningless).
          For timed schedules: actual_duration if reliably shorter than
          planned, otherwise planned. Capped at 60 minutes, defaults to
          10 minutes when the source is NULL or zero.
      - name: schedule_type
        description: >
          Raw OLIDS schedule type. "Timed appointments" = normal bookable
          slots. "Untimed Appointments" / "List" = open-book sessions
          (duty doctor, eConsult triage lists) where appointments inherit
          session-length durations.
      - name: is_untimed_session
        description: >
          TRUE if the parent schedule is an untimed or list session.
          When TRUE, duration_minutes is NULL because the source duration
          cannot be trusted.
      - name: is_attended
        description: TRUE if the appointment was attended (status code 5)
      - name: is_dna
        description: TRUE if the patient did not attend (status code 3)
      - name: contact_mode
        description: >
          Simplified contact mode: Face-to-face, Telephone, Online,
          Home Visit, Video, Not an Appointment, Unknown
      - name: contact_mode_source_code
        description: Raw contact mode from source system
      - name: slot_category
        description: >
          Simplified national slot category: Routine, Acute, Triage,
          Planned Clinic, Clinical Procedure, Unplanned, Home/Care Home
          Visit, Medication Review, Walk-in, Social Prescribing, etc.
      - name: national_slot_category_name
        description: Raw GPAD national slot category name
      - name: practitioner_id
        description: Practitioner identifier (individual clinician)
      - name: practitioner_name
        description: >
          Clinician full name (from stg_olids_practitioner). Personal data
          under UK GDPR. Combined with pseudonymised patient-level
          appointment records this column is a quasi-identifier that
          materially increases re-identification risk for patients (not
          just clinician privacy) — clinician name + practice + date +
          condition can collapse k-anonymity quickly. Restrict downstream
          access accordingly and prefer aggregating at role / practice
          level rather than named clinician unless there is an explicit
          clinical-supervisory purpose.
        config:
          tags:
            - personal_data
          meta:
            contains_personal_data: true
      - name: role_code
        description: Raw SDS role code from practitioner_in_role (e.g. R0260).
      - name: role_name
        description: >
          Raw practitioner role name as recorded by the practice. Free-text
          and unstandardised across practices — use practitioner_role_group
          or sds_role_group for consistent grouping.
      - name: sds_role_group
        description: >
          Official NHS Digital SDS Role Group (GP, Nurses, Other Direct
          Patient Care, Data Quality, Unknown) from the sds_role_groups
          seed. Use for alignment with NHS Digital "Appointments in General
          Practice" publications. Falls back to 'Unknown' if the code is
          not in the seed.
      - name: practitioner_role_group
        description: >
          Analytical practitioner grouping from the sds_role_groups seed.
          Richer than sds_role_group to preserve ARRS workforce signal:
          GP, Other Doctor, Nurse, Nursing Associate, Pharmacist,
          Pharmacy Technician, HCA, Physician Associate, Paramedic,
          Physiotherapist, Counsellor, Care Navigator, Mental Health
          Practitioner, Health & Wellbeing Coach, Social Prescriber,
          Other Clinical, Admin, Other, Unknown. Falls back to 'Other'
          if the code is not in the seed. Admin roles are excluded from
          this model entirely (filtered at the join).
      - name: is_arrs_role
        description: >
          TRUE where the SDS code is unambiguously an ARRS-scheme role
          (sourced from the sds_role_groups seed). Generic profession
          codes (R1290 Pharmacist, R1110 Physiotherapist, R1070 Paramedic)
          are FALSE because non-ARRS staff hold them too. Falls back to
          FALSE if the code is not in the seed.
      - name: urgency
        description: >
          Clinical urgency per the NHSE 2026/27 GP contract definition.
          Urgent = national slot category "General Consultation Acute"
          (the single category practices must use for clinically urgent
          patients).
          Routine = General Consultation Routine/Planned, Planned Clinics,
          Procedures, Medication Review.
          Other = Triage, Unplanned, Walk-in, Home Visit etc.
          (not inherently urgent or routine).
      - name: is_same_day
        description: >
          TRUE if the appointment was booked and seen on the same calendar
          day. This is a booking-timing fact and does not itself imply
          urgency. Used as the numerator for the NHSE urgent same-day
          access KPI.
      - name: booking_to_slot_days
        description: >
          Calendar days from booking to the appointment slot time
          (0 = same day). NULL if the booking time was not recorded.
      - name: fiscal_year_start
        description: >
          UK fiscal year start (calendar year in which 1 April falls).
          Used for costing and any financial-year rollups.
      - name: pssru_cost_per_minute_gbp
        description: >
          PSSRU 2024 unit cost per minute (2023/24 prices) for the
          practitioner_role_group, sourced from pssru_unit_costs_2024.
          NULL for non-clinical role groups.
      - name: cost_is_proxy
        description: >
          TRUE when pssru_cost_per_minute_gbp is borrowed from another
          role's rate (e.g. Paramedic proxied from Physician Associate).
          FALSE for roles with a direct PSSRU 2024 figure — GP, Nurse,
          Pharmacist, HCA, Physician Associate, Physiotherapist,
          Counsellor, Other Clinical. Because GP / Nurse / HCA dominate
          real-world appointment volume, this flag will be FALSE for the
          vast majority of rows; TRUE appointments are typically ARRS
          roles (Paramedic, Pharmacy Technician, Care Navigator, etc.).
          See seeds/pssru_unit_costs_2024 for methodology.
      - name: cost_proxy_source
        description: >
          When cost_is_proxy is TRUE, names the practitioner_role_group
          whose PSSRU rate was borrowed. NULL when cost_is_proxy is FALSE
          — which is expected for the majority of appointments (those
          staffed by GP / Nurse / HCA / Pharmacist etc. where the cost
          is a direct PSSRU figure). Filter WHERE cost_is_proxy = TRUE
          to see only imputed rows.
      - name: appointment_cost_gbp_base_prices
        description: >
          Estimated appointment cost in PSSRU base year prices
          (2023/24), calculated as duration_minutes *
          pssru_cost_per_minute_gbp. Use this for real-terms comparisons
          across fiscal years — the value is in 2023/24 money regardless
          of when the appointment happened.

          NULL only when duration_minutes or the role's unit cost is
          NULL (e.g. untimed/list schedules, Other / Unknown roles).
          Populated for appointments in any fiscal year — this column
          does NOT depend on uk_cost_indices coverage.
      - name: appointment_cost_gbp_nominal
        description: >
          Estimated appointment cost in the appointment's own fiscal
          year prices (contemporaneous / nominal), computed by applying
          the GDP deflator ratio between the appointment year and the
          PSSRU base year (2023/24) from uk_cost_indices. Use for
          reporting costs "as they would have been at the time".

          NULL when:
          * duration_minutes or unit cost is NULL, OR
          * the appointment's fiscal_year_start falls outside the
            uk_cost_indices seed coverage (currently 2000-01 onwards).
            Pre-2000 OLIDS appointments (which are predominantly data
            quality artefacts) will therefore have a NULL nominal cost
            even though base_prices cost is populated — the NULL is
            an intentional data quality signal, not a bug. Extend the
            seed lower bound in analysis/inflation_indices/build_seed.py
            if genuine pre-2000 coverage is needed.
      - name: patient_wait
        description: >
          Minutes the patient waited beyond their scheduled time.
          Populated for ~48% of appointments.
      - name: patient_delay
        description: >
          Minutes the patient arrived late for their appointment.
          Populated for ~41% of appointments.
      - name: booking_method
        description: How the appointment was booked (Practice, EMIS Access, External Organisation)
      - name: local_slot_type
        description: >
          Practice's own free-text slot type name (e.g. "Duty Doctor",
          "Telephone Consultation"). Unstandardised across practices but
          useful for data quality investigation. The national_slot_category_name
          is the standardised equivalent.
      - name: service_setting
        description: Service setting where the appointment took place
      - name: age_at_event
        description: Patient age at the time of the appointment
      - name: record_owner_organisation_code
        description: Practice ODS code (e.g. E85012)

  - name: int_appointment_gp_clean_recent
    description: |
      Recent-window view over int_appointment_gp_clean. Same grain
      (one row per appointment), same columns, restricted to the
      rolling last 60 months of data anchored to MAX(start_date).

      Why this view exists: OLIDS only retains records for patients
      who left or died within the last ~5 years. Anything older is
      silently truncated to currently-registered patients only,
      systematically biasing historical reporting (per-capita cost
      drifts down, DNA rate biased toward stayers, workforce mix
      tilts). Restricting reporting to a 5-year window matching OLIDS
      retention keeps the population denominator honest.

      All reporting models in models/reporting/olids/gp_access/ and
      models/reporting/olids/gp_costs/ build from this view rather
      than the unfiltered int_appointment_gp_clean. The semantic view
      sem_olids_appointments also references this view.

      Materialised as a view (zero storage cost) — Snowflake pushes
      the date filter down to the underlying clustered table.
    config:
      meta:
        owner:
          name: Eddie Davison
    data_tests:
      - dbt_utils.at_least_one:
          arguments:
            column_name: appointment_id
    columns:
      - name: appointment_id
        description: Unique appointment identifier from OLIDS (same grain as int_appointment_gp_clean).
        data_tests:
          - not_null
          - unique
      - name: person_id
        description: Person identifier (deduplicated across patient IDs).
        data_tests:
          - not_null
