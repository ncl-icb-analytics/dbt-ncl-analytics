models:
  - name: int_ltc_lcs_hf_observations
    description: >
      Heart failure case-finding observation evidence for LTC LCS case finding.

      One row per person-valueset latest observation for: HF evidence (base exclusion),
      NT-proBNP levels, cardiology referral, heart failure exclusion codes, cardiomyopathy
      evidence, breathlessness, and hirsutism-related coding. Observation branches map to
      EMIS ICB_CF_HF_61_woEX rule structure.
    config:
      meta:
        owner:
          name: EddieDavison92
    tests:
      - dbt_utils.at_least_one:
          column_name: person_id
      - valuesets_have_codes:
          arguments:
            valuesets:
              - eligible_for_hf_casefinding_vs1
              - hf_case_finding_eligible_patients_vs5
              - hf_case_finding_eligible_patients_vs6
              - hf_case_finding_eligible_patients_vs7
              - hf_case_finding_eligible_patients_vs8
              - hf_case_finding_eligible_patients_vs9
              - hf_case_finding_eligible_patients_vs13
    columns:
      - name: person_id
        tests:
          - not_null
