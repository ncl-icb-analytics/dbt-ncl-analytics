models:
  - name: int_ltc_lcs_cf_hf_61_base
    description: 'Base population for HF_61 case finding.

      One row per currently registered person eligible for HF case finding after excluding metabolic LTC programme patients, AF register patients, HF register patients, and patients with recorded heart failure or ventricular dysfunction evidence.'
    tests:
      - dbt_utils.at_least_one:
          column_name: person_id
      - valuesets_have_codes:
          arguments:
            valuesets:
              - eligible_for_hf_casefinding_vs1
    columns:
      - name: person_id
        tests:
          - not_null
          - unique
    config:
      meta:
        indicator:
          id: "LTC_LCS_CF_HF_61_BASE"
          type: "POPULATION"
          category: "HF"
          clinical_domain: "Heart Failure Case Finding"
          name_short: "HF_61 base population"
          description_short: "Current registered population eligible for HF case finding"
          description_long: >
            Current registered patients excluding metabolic LTC programme members,
            patients already on AF or HF disease registers, and patients with recorded
            heart failure or ventricular dysfunction evidence.
          is_qof: false
          source_column: "person_id"
          sort_order: "LTC_LCS_HF_61_BASE"
          usage_contexts:
            - "LTC_LCS_DASHBOARD"
            - "CASE_FINDING_PROGRAMME"
          code_clusters:
            - cluster_id: "eligible_for_hf_casefinding_vs1"
              category: "EXCLUSION"
            - cluster_id: "AF_REGISTER"
              category: "EXCLUSION"
            - cluster_id: "HF_REGISTER"
              category: "EXCLUSION"
            - cluster_id: "ICS_METABOLIC_LTC"
              category: "EXCLUSION"
        owner:
          name: EddieDavison92

