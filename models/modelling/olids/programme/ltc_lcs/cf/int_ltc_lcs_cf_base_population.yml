models:
  - name: int_ltc_lcs_cf_base_population
    description: >
      Base population for metabolic/cardiovascular LTC case finding indicators.

      One row per eligible person excluding patients already in metabolic/CV LTC programmes
      (ICS_METABOLIC_LTC equivalent: AF, CKD, CHD, HTN, HF, Stroke/TIA, PAD, NAFLD,
      Diabetes (all types), Hyperlipidaemia) and those with NHS health checks in last
      24 months. Does NOT exclude respiratory conditions (COPD, Asthma) — those use
      ICS_RESP_LTC separately for the CYP Asthma pathway.
    tests:
      - dbt_utils.at_least_one:
          column_name: person_id
    columns:
      - name: person_id
        tests:
          - not_null
    config:
      meta:
        indicator:
          id: "LTC_LCS_CF_BASE_POPULATION"
          type: "POPULATION"
          category: "CASE_FINDING"
          clinical_domain: "Population Health Management"
          name_short: "LTC/LCS base population"
          description_short: "Eligible population for metabolic/CV case finding with exclusions applied"
          description_long: >
            Active patients with practice registration, excluding metabolic/CV LTC programme
            participants (ICS_METABOLIC_LTC: CKD, AF, HTN, CHD, STIA, PAD, HF, Diabetes
            (all types), Hyperlipidaemia, NAFLD) and recent NHS health check recipients (24m).
            Does NOT exclude respiratory conditions (COPD, Asthma) which are handled separately
            via ICS_RESP_LTC for the CYP Asthma pathway. Forms foundation for metabolic case
            finding indicators.
          is_qof: false
          source_column: "person_id"
          sort_order: "LTC_LCS_BASE_001"
          usage_contexts:
            - "LTC_LCS_DASHBOARD"
            - "CASE_FINDING_PROGRAMME"
          code_clusters:
            - cluster_id: "HEALTH_CHECK_COMP"
              category: "EXCLUSION"
            - cluster_id: "CKD_COD"
              category: "EXCLUSION"
            - cluster_id: "AFIB_COD"
              category: "EXCLUSION"
            - cluster_id: "HTN_COD"
              category: "EXCLUSION"
            - cluster_id: "CHD_COD"
              category: "EXCLUSION"
            - cluster_id: "STIA_COD"
              category: "EXCLUSION"
            - cluster_id: "PAD_COD"
              category: "EXCLUSION"
            - cluster_id: "HF_COD"
              category: "EXCLUSION"
            - cluster_id: "DM_COD"
              category: "EXCLUSION"
            - cluster_id: "FHYP_COD"
              category: "EXCLUSION"
            - cluster_id: "NAF_COD"
              category: "EXCLUSION"
          thresholds:
            - population_group: "ALL_ADULTS"
              threshold_type: "NHS_HEALTH_CHECK_EXCLUSION"
              threshold_value: "24"
              threshold_operator: "WITHIN"
              threshold_unit: "months"
              description: "Exclude patients with NHS health checks in last 24 months"
              sort_order: 1
        owner:
          name: EddieDavison92
