models:
  - name: int_ltc_lcs_hf_medications
    description: 'Heart failure case-finding medication issues for Long Term Conditions case finding measures.

      One row per medication issue for HF-indicative therapies including sacubitril/valsartan, Entresto, ivabradine, eplerenone, dapagliflozin/empagliflozin, digoxin-group medications, digoxin, and spironolactone.'
    config:
      meta:
        owner:
          name: EddieDavison92
    tests:
      - dbt_utils.at_least_one:
          column_name: person_id
      - cluster_ids_exist:
          arguments:
            cluster_ids: ENTRESTO_PRODUCTS
      - valuesets_have_codes:
          arguments:
            valuesets:
              - hf_case_finding_eligible_patients_vs1
              - hf_case_finding_eligible_patients_vs3
              - hf_case_finding_eligible_patients_vs4
              - hf_case_finding_eligible_patients_vs10
              - hf_case_finding_eligible_patients_vs11
    columns:
      - name: person_id
        tests:
          - not_null
