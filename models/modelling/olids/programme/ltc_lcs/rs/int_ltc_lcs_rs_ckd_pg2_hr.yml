models:
  - name: int_ltc_lcs_rs_ckd_pg2_hr
    description: |
      CKD Register Priority Group 2 - High Risk.

      EMIS final gating:
      - Exclude PG1
      - Require recent repeat antihypertensive medication in the last 3 months
      - Require latest BP in the last 12 months with diastolic > 90 or systolic > 150
    config:
      meta:
        owner:
          name: Eddie Davison
    tests:
      - dbt_utils.at_least_one:
          column_name: person_id
    columns:
      - name: person_id
        tests:
          - not_null
          - unique
