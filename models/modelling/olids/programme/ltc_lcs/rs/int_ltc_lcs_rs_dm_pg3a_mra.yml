models:
  - name: int_ltc_lcs_rs_dm_pg3a_mra
    description: |
      Diabetes Register Priority Group 3A - Moderate Risk A identification.

      EMIS final include path:
      - Exclude PG1 and PG2
      - Require HbA1c > 58 and <= 75
      - Require latest ABPM BP >= 140 systolic or >= 90 diastolic
    config:
      meta:
        owner:
          name: EddieDavison92
    tests:
      - dbt_utils.at_least_one:
          column_name: person_id
      - valuesets_have_codes:
          arguments:
            valuesets:
              - on_dm_reg_priority_group_3a_mra_vs1
    columns:
      - name: person_id
        tests:
          - not_null
          - unique
