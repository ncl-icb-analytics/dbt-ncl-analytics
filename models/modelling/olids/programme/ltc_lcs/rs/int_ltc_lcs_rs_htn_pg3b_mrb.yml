models:
  - name: int_ltc_lcs_rs_htn_pg3b_mrb
    description: |
      Hypertension Register Priority Group 3B - Medium Risk (b) identification.
      Excludes PG1 (HRC), PG2 (HR), and PG3A (MRa) patients.

      No comorbidity required. Patients are included if their latest BP (within 12 months)
      exceeds age-appropriate thresholds:

      Age <= 80:
      - Clinic: SBP > 140 or DBP > 90
      - Home/ABPM: SBP > 135 or DBP > 85

      Age > 80 (relaxed systolic):
      - Clinic: SBP > 150 or DBP > 90
      - Home/ABPM: SBP > 145 or DBP > 85
    config:
      meta:
        owner:
          name: Eddie Davison
    tests:
      - dbt_utils.at_least_one:
          column_name: person_id
    columns:
      - name: person_id
        tests:
          - not_null
          - unique
