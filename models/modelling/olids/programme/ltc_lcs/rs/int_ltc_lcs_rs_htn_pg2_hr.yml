models:
  - name: int_ltc_lcs_rs_htn_pg2_hr
    description: |
      Hypertension Register Priority Group 2 - High Risk identification.
      Excludes PG1 (HRC) patients.

      Patients are included if EITHER of the following apply:

      PG2a - Stage 2 BP (no comorbidity required):
      - Clinic: SBP > 160 or DBP > 100
      - Home/ABPM: SBP > 150 or DBP > 95

      PG2b - Stage 1 BP + Black ethnicity + comorbidity:
      - Clinic: SBP >= 140 or DBP >= 90
      - Home/ABPM: SBP >= 135 or DBP >= 85
      - Ethnicity: vs3 Black African/Caribbean/British
      - Comorbidity (any): vs4 CHD, vs5+vs6 Stroke/TIA, vs7 PAD, vs8 CKD,
        vs9 eGFR < 60, vs10 Diabetes, vs11 BMI > 35
    config:
      meta:
        owner:
          name: Eddie Davison
    tests:
      - dbt_utils.at_least_one:
          column_name: person_id
      - valuesets_have_codes:
          arguments:
            valuesets:
              - priority_group_2b_icb_v3_vs3
              - priority_group_2b_icb_v3_vs4
              - priority_group_2b_icb_v3_vs5
              - priority_group_2b_icb_v3_vs6
              - priority_group_2b_icb_v3_vs7
              - priority_group_2b_icb_v3_vs8
              - priority_group_2b_icb_v3_vs9
              - priority_group_2b_icb_v3_vs10
              - priority_group_2b_icb_v3_vs11
    columns:
      - name: person_id
        tests:
          - not_null
          - unique
