models:
  - name: int_ltc_lcs_rs_dm_pg3b_mrb
    description: |
      Diabetes Register Priority Group 3B - Moderate Risk B identification.

      EMIS final include path:
      - Exclude PG1, PG2, and PG3A
      - Require HbA1c > 48 and <= 58
      - Require latest ABPM BP >= 140 systolic or >= 90 diastolic
    config:
      meta:
        owner:
          name: EddieDavison92
    tests:
      - dbt_utils.at_least_one:
          column_name: person_id
      - valuesets_have_codes:
          arguments:
            valuesets:
              - on_dm_reg_priority_group_3b_mrb_vs1
    columns:
      - name: person_id
        tests:
          - not_null
          - unique
