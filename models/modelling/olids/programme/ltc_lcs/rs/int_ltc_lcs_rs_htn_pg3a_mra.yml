models:
  - name: int_ltc_lcs_rs_htn_pg3a_mra
    description: |
      Hypertension Register Priority Group 3A - Medium Risk (a) identification.
      Excludes PG1 (HRC) and PG2 (HR) patients.

      Patients are included if they have a comorbidity AND uncontrolled BP:

      Comorbidities (any one):
      - vs3: CHD (first episode, excl review/end)
      - vs4+vs5: Stroke/TIA (first episode, excl review/end)
      - vs6: PAD (first episode, excl review/end)
      - vs7: CKD
      - vs8: eGFR < 60
      - vs9: Diabetes
      - vs10: Black ethnicity

      BP thresholds (latest in 12 months):
      - Clinic: SBP > 140 or DBP > 90
      - Home/ABPM: SBP > 135 or DBP > 85
    config:
      meta:
        owner:
          name: Eddie Davison
    tests:
      - dbt_utils.at_least_one:
          column_name: person_id
      - valuesets_have_codes:
          arguments:
            valuesets:
              - on_htn_reg_priority_group_3a_mra_v3_vs3
              - on_htn_reg_priority_group_3a_mra_v3_vs4
              - on_htn_reg_priority_group_3a_mra_v3_vs5
              - on_htn_reg_priority_group_3a_mra_v3_vs6
              - on_htn_reg_priority_group_3a_mra_v3_vs7
              - on_htn_reg_priority_group_3a_mra_v3_vs8
              - on_htn_reg_priority_group_3a_mra_v3_vs9
              - on_htn_reg_priority_group_3a_mra_v3_vs10
    columns:
      - name: person_id
        tests:
          - not_null
          - unique
