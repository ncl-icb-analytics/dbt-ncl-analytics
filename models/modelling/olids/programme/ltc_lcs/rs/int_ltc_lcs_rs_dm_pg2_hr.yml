models:
  - name: int_ltc_lcs_rs_dm_pg2_hr
    description: |
      Diabetes Register Priority Group 2 - High Risk identification.

      EMIS final include path:
      - Exclude PG1
      - Include only patients with latest ACR > 70
    config:
      meta:
        owner:
          name: EddieDavison92
    tests:
      - dbt_utils.at_least_one:
          column_name: person_id
      - valuesets_have_codes:
          arguments:
            valuesets:
              - on_dm_reg_pg2_hr_vs7
    columns:
      - name: person_id
        tests:
          - not_null
          - unique
