models:
  - name: int_ltc_lcs_rs_base_population
    description: |
      LTC LCS register stratification base population.

      This model matches the EMIS LTC LCS Base report by taking the union of the
      LTC register populations used in the programme:
      AF, CKD, CHD, Diabetes, Hypertension, NAFLD, Asthma Adult, Asthma CYP,
      COPD, HF, PAD, and Stroke/TIA.
    config:
      meta:
        owner:
          name: Eddie Davison
    tests:
      - dbt_utils.at_least_one:
          column_name: person_id
    columns:
      - name: person_id
        tests:
          - not_null
          - unique
