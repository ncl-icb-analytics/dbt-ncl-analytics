models:
  - name: int_ltc_lcs_rs_ckd_pg3_mr
    description: |
      CKD Register Priority Group 3 - Moderate Risk.

      EMIS final include path:
      - Exclude PG1 and PG2
      - Require eGFR 30-44
      - Require ACR < 3
    config:
      meta:
        owner:
          name: Eddie Davison
    tests:
      - dbt_utils.at_least_one:
          column_name: person_id
      - valuesets_have_codes:
          arguments:
            valuesets:
              - on_ckd_reg_pg3_mr_vs1
              - on_ckd_reg_pg3_mr_vs2
    columns:
      - name: person_id
        tests:
          - not_null
          - unique
