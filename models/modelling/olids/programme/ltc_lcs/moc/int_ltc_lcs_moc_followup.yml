models:
  - name: int_ltc_lcs_moc_followup
    description: |
      LTC LCS Model of Care - Follow-up appointment completed.

      Flags persons with a Review of Personalised Care and Support Plan event
      (<< 1187921000000104) recorded in the last 12 months. One row per person.
    config:
      meta:
        owner:
          name: EddieDavison92
    tests:
      - dbt_utils.at_least_one:
          column_name: person_id
      - valuesets_have_codes:
          arguments:
            valuesets:
              - 5_moc_follow_up_vs1
    columns:
      - name: person_id
        description: Unique person identifier
        tests:
          - not_null
          - unique
      - name: latest_completed_date
        description: Most recent follow-up appointment date within the last 12 months
        tests:
          - not_null
      - name: followup_completed
        description: Always true — row presence indicates a Review of PCSP event in the last 12 months
        tests:
          - not_null
