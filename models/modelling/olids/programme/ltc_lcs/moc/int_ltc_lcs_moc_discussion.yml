models:
  - name: int_ltc_lcs_moc_discussion
    description: |
      LTC LCS Model of Care - Discussion appointment completed.

      Flags persons with a Personalised Care and Support Plan agreed event
      (<< 1187911000000105) recorded in the last 12 months. One row per person.
    config:
      meta:
        owner:
          name: EddieDavison92
    tests:
      - dbt_utils.at_least_one:
          arguments:
            column_name: person_id
      - valuesets_have_codes:
          arguments:
            valuesets:
              - 4_moc_discussion_vs1
    columns:
      - name: person_id
        description: Unique person identifier
        data_tests:
          - not_null
          - unique
      - name: latest_completed_date
        description: Most recent discussion appointment date within the last 12 months
        data_tests:
          - not_null
      - name: discussion_completed
        description: Always true — row presence indicates a PCSP-agreed discussion event in the last 12 months
        data_tests:
          - not_null
