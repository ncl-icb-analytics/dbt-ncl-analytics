models:
  - name: int_ltc_lcs_moc_careplan_sharing
    description: |
      LTC LCS Model of Care - Care plan sharing completed.

      Flags persons with a Long term condition summary sent to patient event
      (<< 862701000000104) recorded in the last 12 months. One row per person.
    config:
      meta:
        owner:
          name: EddieDavison92
    tests:
      - dbt_utils.at_least_one:
          arguments:
            column_name: person_id
      - valuesets_have_codes:
          arguments:
            valuesets:
              - careplan_sharing_completed_vs1
    columns:
      - name: person_id
        description: Unique person identifier
        data_tests:
          - not_null
          - unique
      - name: latest_completed_date
        description: Most recent care plan sharing date within the last 12 months
        data_tests:
          - not_null
      - name: careplan_sharing_completed
        description: Always true — row presence indicates a care plan sharing event in the last 12 months
        data_tests:
          - not_null
