models:
  - name: int_ltc_lcs_moc_check_test
    description: |
      LTC LCS Model of Care - Check & Test appointment completed.

      Flags persons with a Chronic disease initial assessment event (<< 170557005)
      recorded in the last 12 months. One row per person.
    config:
      meta:
        owner:
          name: EddieDavison92
    tests:
      - dbt_utils.at_least_one:
          column_name: person_id
      - valuesets_have_codes:
          arguments:
            valuesets:
              - check_test_appointment_completed_vs1
    columns:
      - name: person_id
        description: Unique person identifier
        tests:
          - not_null
          - unique
      - name: latest_completed_date
        description: Most recent Check & Test appointment date within the last 12 months
        tests:
          - not_null
      - name: check_test_completed
        description: Always true — row presence indicates a Check & Test event in the last 12 months
        tests:
          - not_null
