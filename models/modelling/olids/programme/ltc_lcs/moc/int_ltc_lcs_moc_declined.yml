models:
  - name: int_ltc_lcs_moc_declined
    description: |
      LTC LCS Model of Care - MoC declined.

      Flags persons with a Personalised Care and Support Planning declined event
      (<< 1325711000000103) recorded in the last 12 months. One row per person.
    config:
      meta:
        owner:
          name: EddieDavison92
    tests:
      - dbt_utils.at_least_one:
          column_name: person_id
      - valuesets_have_codes:
          arguments:
            valuesets:
              - follow_up_appointment_completedmoc_declined_vs1
    columns:
      - name: person_id
        description: Unique person identifier
        tests:
          - not_null
          - unique
      - name: latest_declined_date
        description: Most recent MoC declined date within the last 12 months
        tests:
          - not_null
      - name: moc_declined
        description: Always true — row presence indicates a PCSP declined event in the last 12 months
        tests:
          - not_null
