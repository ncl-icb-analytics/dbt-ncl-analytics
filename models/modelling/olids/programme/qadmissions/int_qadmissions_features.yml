version: 2

models:
  - name: int_qadmissions_features
    description: >
      Input feature set for the QAdmissions 1-year emergency-admission risk
      model registered in Snowflake's model registry. One row per active,
      non-deceased person in dim_person_demographics with a recorded gender
      of Male or Female.

      This model does NOT compute a risk score - it only assembles the
      input features that the registered model consumes. See
      planning/qadmissions/plan.md for the full feature-to-source map and
      planning/qadmissions/overview.md for the required ClinRisk disclaimer.

      Placeholder columns (defaulted until their source intermediates land):
      b_falls, b_malabsorption, b_vte, town, alcohol_cat6, ethrisk.
      b_liverpancreas is partial (chronic liver disease only; pancreatic
      disease component to follow).
    config:
      meta:
        owner:
          name: Thomas Shallcross
    columns:
      - name: person_id
        data_type: varchar
        description: "OLIDS-native unique person identifier. Primary key of this model."
        data_tests:
          - unique
          - not_null

      - name: sk_patient_id
        data_type: varchar
        description: >
          Commissioning-side patient identifier. Join key expected by the
          Snowflake-registered QAdmissions model. Note that a small number of
          sk_patient_id values can appear on more than one row because
          upstream dim_person_demographics can map several person_ids to the
          same sk_patient_id in identity-reconciliation edge cases.
        data_tests:
          - not_null

      - name: age
        data_type: number
        description: "Current age in years"
        data_tests:
          - not_null

      - name: gender
        data_type: number
        description: "Sex for QAdmissions. 0 = female, 1 = male."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1]

      - name: bmi
        data_type: float
        description: "Latest recorded BMI (kg/m^2) from int_bmi_latest. Raw value - not clipped; NULL when no BMI has been recorded for the person."

      - name: sha1
        data_type: number
        description: "Strategic Health Authority code. Constant 5 (London) for all NCL patients."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [5]

      - name: surv
        data_type: number
        description: "Survival horizon in years for the QAdmissions prediction. Defaults to 1 via var('qadmissions_horizon_years')."
        data_tests:
          - not_null

      - name: b_AF
        data_type: boolean
        description: "Atrial fibrillation. Sourced from dim_person_conditions.has_atrial_fibrillation."

      - name: b_CCF
        data_type: boolean
        description: "Congestive cardiac failure. Sourced from dim_person_conditions.has_heart_failure."

      - name: b_anycancer
        data_type: boolean
        description: "Any cancer diagnosis. Sourced from dim_person_conditions.has_cancer."

      - name: b_asthmacopd
        data_type: boolean
        description: "Asthma or COPD. Sourced from dim_person_conditions.has_asthma OR has_copd."

      - name: b_epilepsy
        data_type: boolean
        description: "Epilepsy. Sourced from dim_person_conditions.has_epilepsy."

      - name: b_renal
        data_type: boolean
        description: "Chronic kidney disease. Sourced from dim_person_conditions.has_chronic_kidney_disease."

      - name: b_manicschiz
        data_type: boolean
        description: "Severe mental illness (mania / schizophrenia). Sourced from dim_person_conditions.has_severe_mental_illness."

      - name: b_cvd
        data_type: boolean
        description: "Cardiovascular disease composite: coronary heart disease OR stroke/TIA OR peripheral arterial disease."

      - name: b_type1
        data_type: boolean
        description: "Type 1 diabetes, from fct_person_diabetes_register. 'Unknown' diabetes type maps to FALSE."

      - name: b_type2
        data_type: boolean
        description: "Type 2 diabetes, from fct_person_diabetes_register. 'Unknown' diabetes type maps to FALSE."

      - name: smoke_cat
        data_type: number
        description: >
          Smoking category. 0 = never smoked, 1 = ex-smoker, 3 = current smoker.
          Category 2 (light smoker with CPD) and categories 4-5 (moderate/heavy
          smokers) cannot be produced from the available data - CPD is not
          captured. Current smokers therefore map to category 3. See plan.md
          decision 1.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1, 3]

      - name: b_anticoagulant
        data_type: boolean
        description: "Two or more anticoagulant prescriptions in the prior 6 months. Uses int_anticoagulant_medications_all.is_recent_6m."

      - name: b_antidepressant
        data_type: boolean
        description: "Two or more antidepressant prescriptions in the prior 6 months. Uses int_antidepressant_medications_all.is_recent_6m."

      - name: b_antipsychotic
        data_type: boolean
        description: "Two or more antipsychotic prescriptions in the prior 6 months. Uses int_antipsychotic_medications_all.is_recent_6m."

      - name: b_corticosteroids
        data_type: boolean
        description: "Two or more systemic corticosteroid prescriptions in the prior 6 months. Uses int_systemic_corticosteroid_medications_all.is_recent_6m."

      - name: b_nsaid
        data_type: boolean
        description: "Two or more NSAID prescriptions in the prior 6 months. Uses int_nsaid_medications_all.is_recent_6m."

      - name: hes_admitprior_cat
        data_type: number
        description: >
          Number of emergency inpatient spells in the prior 365 days, capped
          at 3 (so possible values are 0, 1, 2, 3+). Sourced from
          stg_sus_apc_spell rows where spell_admission_admission_sub_type = 'EMR'.
          Joined on sk_patient_id.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1, 2, 3]

      - name: c_hb
        data_type: boolean
        description: "Low-haemoglobin flag. TRUE if latest haemoglobin value is below the threshold from qadmissions_lab_thresholds seed, FALSE otherwise (including NULL haemoglobin)."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: high_lft
        data_type: boolean
        description: "High liver-function-test flag. TRUE if any of ALT, GGT, or bilirubin exceeds its threshold from qadmissions_lab_thresholds seed, FALSE otherwise."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: high_platelet
        data_type: boolean
        description: "High platelet flag. TRUE if latest platelet count exceeds the threshold from qadmissions_lab_thresholds seed, FALSE otherwise (including NULL platelets)."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: b_falls
        data_type: boolean
        description: "TODO Step 4: falls history. Currently defaulted to FALSE until int_falls_diagnoses_all lands."

      - name: b_malabsorption
        data_type: boolean
        description: "TODO Step 4: malabsorption (coeliac / IBD / post-resection). Currently defaulted to FALSE until int_malabsorption_diagnoses_all lands."

      - name: b_vte
        data_type: boolean
        description: "TODO Step 4: venous thromboembolism (DVT / PE). Currently defaulted to FALSE until int_vte_diagnoses_all lands."

      - name: b_liverpancreas
        data_type: boolean
        description: >
          Chronic liver disease OR pancreatic disease. PARTIAL - currently
          sourced only from dim_person_conditions.has_chronic_liver_disease
          until int_pancreatic_disease_diagnoses_all lands (Step 4).

      - name: town
        data_type: number
        description: "TODO Step 5: Townsend deprivation score. Currently defaulted to 0 (national mean) until the LSOA Townsend seed and int_qadmissions_townsend land."

      - name: alcohol_cat6
        data_type: number
        description: "TODO Step 2: alcohol category (0-5) from AUDIT scores. Currently defaulted to 0 (non-drinker) until the qadmissions_alcohol_audit_to_cat6 mapping seed lands."

      - name: ethrisk
        data_type: number
        description: "TODO Step 2: ethnicity risk group (1-9). Currently defaulted to 1 (White / not stated) until the qadmissions_eth2016_to_ethrisk9 mapping seed lands."
