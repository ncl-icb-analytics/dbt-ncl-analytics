models:
  - name: int_patient_deceased_status
    description: Patient-level deceased status with approximate death date.
      Uses midpoint of death month, or July 1st if only death year is known.

    config:
      meta:
        owner:
          name: EddieDavison92

    columns:
      - name: patient_id
        description: Patient identifier
        tests:
          - not_null
          - unique
      - name: sk_patient_id
        description: Person identifier
      - name: is_deceased
        description: TRUE if death_year is populated from all sources combined.
      - name: death_source_flag
        description: > 
          Flag indicating the source of the final death date,
          'OLIDS' if final date of death is from OLIDS, 'PDS' if from PDS, 'REGISTRY' if from registry feed. Can be a combination of sources.
      - name: death_month
        description: Month of death (NULL if alive or unknown) from all sources combined.
      - name: death_year
        description: Year of death (NULL if alive) from all sources combined.
      - name: death_date_approx
        description: >
          Approximate death date from all sources combined. Midpoint of death month if month known,
          July 1st of death year if only year known, NULL if alive.
      - name: olids_death_date_approx
        description: >
          Approximate death date from OLIDS. Midpoint of death month if month known,
          July 1st of death year if only year known, NULL if alive.
      - name: pds_death_status
        description: Death status from PDS (NULL if alive) 1 Informal, 2 Formal
      - name: pds_date_of_death
        description: Date of death from PDS (NULL if alive)
      - name: reg_date_of_death
        description: Date of death from registry feed (NULL if alive)
      - name: final_date_of_death
        description: > 
          Final date of death derived from all sources. Uses OLIDS date if PDS and registry dates do not match and OLIDS date is the only one available, otherwise uses PDS date if available, otherwise uses registry date.
     